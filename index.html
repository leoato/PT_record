<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fit-Track Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitTrack">
    <link rel="apple-touch-icon" href="icon.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
/* ===================================================
   THEME VARIABLES
=================================================== */
:root {
    --primary:#2563eb; --secondary:#3b82f6; --success:#059669; --danger:#dc2626;
    --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --text-muted:#64748b;
    --border:#e2e8f0; --shadow:0 4px 20px rgba(0,0,0,0.08); --glow:none;
    --nav-bg:#ffffff; --nav-inactive:#94a3b8; --input-bg:#f1f5f9; --day-bg:#f1f5f9;
}
body[data-theme="hell"] {
    --primary:#ff0000; --secondary:#ff4800; --success:#ff8000; --danger:#991b1b;
    --bg:#000; --card:#0a0000; --text:#fff1f1; --text-muted:#9a6060;
    --border:#3d0a0a; --shadow:0 10px 40px -10px rgba(255,0,0,0.4);
    --glow:0 0 15px rgba(255,0,0,0.6),0 0 30px rgba(255,72,0,0.4);
    --nav-bg:#000; --nav-inactive:#5a2d2d; --input-bg:#140404; --day-bg:#110303;
}
body[data-theme="ocean"] {
    --primary:#00d4ff; --secondary:#0ea5e9; --success:#34d399; --danger:#f87171;
    --bg:#070d1a; --card:#0d1829; --text:#e0f2fe; --text-muted:#60a5b4;
    --border:#1e3a5f; --shadow:0 10px 40px -10px rgba(0,212,255,0.15);
    --glow:0 0 20px rgba(0,212,255,0.25); --nav-bg:#070d1a; --nav-inactive:#2a5a6e;
    --input-bg:#0d1829; --day-bg:#0d1829;
}

/* ===================================================
   BASE
=================================================== */
*{box-sizing:border-box;}
body{
    font-family:-apple-system,system-ui,sans-serif;
    margin:0;background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;transition:background .3s,color .3s;
}
body[data-theme="hell"]{background-image:radial-gradient(circle at center bottom,#3a0a0a 0%,#000 80%);background-attachment:fixed;}
body[data-theme="ocean"]{background-image:radial-gradient(circle at 30% 70%,#0a1f3d 0%,#070d1a 70%);background-attachment:fixed;}

#app{display:flex;flex-direction:column;height:100vh;}

header{
    background:var(--card);
    backdrop-filter:blur(10px);
    padding:calc(12px + env(safe-area-inset-top)) 12px 12px;
    border-bottom:2px solid var(--primary);
    box-shadow:var(--glow);
    position:sticky;top:0;z-index:100;
}
body[data-theme="hell"] header,body[data-theme="ocean"] header{background:rgba(0,0,0,0.92);}

h1{margin:0;font-size:18px;text-align:center;color:var(--text);}
h3,h4,h5{color:var(--text);}

.date-selector{display:flex;justify-content:center;gap:10px;margin-bottom:5px;}
.date-selector button{
    padding:6px 16px;border-radius:20px;
    border:2px solid var(--primary);background:var(--card);
    color:var(--primary);font-weight:900;cursor:pointer;
}
.date-selector input{
    border:1px solid var(--border);font-weight:bold;
    background:var(--card);color:var(--text);
    padding:5px 10px;border-radius:8px;font-size:15px;
}

#app-content{flex:1;overflow-y:auto;padding:15px 15px 100px;-webkit-overflow-scrolling:touch;}

/* ===================================================
   CARD
=================================================== */
.card{
    background:var(--card);border-radius:16px;padding:16px;
    margin-bottom:15px;border:1px solid var(--border);
    box-shadow:var(--shadow);position:relative;overflow:hidden;
}
body[data-theme="hell"] .card::before,
body[data-theme="ocean"] .card::before{
    content:'';position:absolute;top:0;left:0;width:100%;height:2px;
    background:linear-gradient(90deg,transparent,var(--primary),transparent);
}

/* ===================================================
   NAVIGATION
=================================================== */
.bottom-nav{
    position:fixed;bottom:0;width:100%;height:75px;
    background:var(--nav-bg);display:flex;
    border-top:2px solid var(--primary);
    padding-bottom:env(safe-area-inset-bottom);
    z-index:100;box-shadow:var(--glow);
}
.nav-btn{
    flex:1;border:none;background:none;font-size:10px;
    color:var(--nav-inactive);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;
}
.nav-btn.active{color:var(--primary);font-weight:bold;}
body[data-theme="hell"] .nav-btn.active,
body[data-theme="ocean"] .nav-btn.active{text-shadow:0 0 10px var(--primary);}

/* ===================================================
   FORM ELEMENTS
=================================================== */
label{font-size:13px;color:var(--text-muted);margin-top:12px;display:block;}
input,select,textarea{
    width:100%;padding:12px;
    border:2px solid var(--border);border-radius:10px;
    font-size:16px;margin-top:5px;
    background:var(--input-bg);color:var(--text);
}
input:focus,select:focus,textarea:focus{border-color:var(--primary);outline:none;box-shadow:var(--glow);}
select option{background:var(--input-bg);color:var(--text);}

button.primary{
    width:100%;padding:16px;
    background:linear-gradient(135deg,var(--secondary),var(--primary));
    color:#fff;border:none;border-radius:12px;font-weight:bold;
    margin-top:15px;cursor:pointer;
    text-transform:uppercase;letter-spacing:1px;box-shadow:var(--glow);
}
.btn-sm{padding:8px 12px;border-radius:8px;border:none;font-size:12px;font-weight:bold;cursor:pointer;}
.btn-edit{background:var(--day-bg);color:var(--secondary);border:1px solid var(--secondary);}
.btn-del{background:var(--day-bg);color:var(--danger);border:1px solid var(--danger);}

/* ===================================================
   CALENDAR
=================================================== */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:15px;}
.calendar-day{
    min-height:62px;border:1px solid var(--border);border-radius:10px;
    padding:5px;font-size:11px;background:var(--day-bg);
    display:flex;flex-direction:column;cursor:pointer;
    transition:border-color .2s;
}
.calendar-day strong{color:var(--primary);}
.calendar-day.selected{border:2px solid var(--primary);box-shadow:var(--glow);}
.calendar-day.today strong{color:var(--success);}

/* ===================================================
   FILTER BUTTONS
=================================================== */
.filter-group{display:flex;gap:8px;overflow-x:auto;padding:5px 0 15px;-webkit-overflow-scrolling:touch;}
.filter-btn{
    padding:8px 16px;border-radius:10px;border:1px solid var(--border);
    background:var(--card);color:var(--text);white-space:nowrap;
    font-size:13px;font-weight:bold;cursor:pointer;
}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--glow);}

/* ===================================================
   GRAPH TABS
=================================================== */
.tab-group{display:flex;gap:6px;background:var(--day-bg);border-radius:12px;padding:6px;margin-bottom:15px;}
.tab-option{flex:1;padding:8px;border-radius:8px;border:none;background:none;font-size:13px;color:var(--text-muted);cursor:pointer;font-weight:bold;}
.tab-option.active{background:var(--primary);color:#fff;}

/* ===================================================
   PR BADGE
=================================================== */
.pr-badge{
    display:inline-block;background:gold;color:#7a5000;
    border-radius:4px;padding:1px 6px;font-size:10px;font-weight:bold;margin-left:5px;
}

/* ===================================================
   STREAK BANNER
=================================================== */
.streak-banner{
    background:linear-gradient(135deg,var(--secondary),var(--primary));
    border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;
    margin-bottom:14px;color:#fff;box-shadow:var(--glow);
}

/* ===================================================
   PROTEIN RING
=================================================== */
.ring-wrap{display:flex;align-items:center;justify-content:center;gap:24px;padding:8px 0;}
.ring-svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
.ring-prog{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dasharray .6s ease;}

/* ===================================================
   RECENT HISTORY BOX
=================================================== */
.hist-box{background:var(--day-bg);border-radius:10px;padding:10px;margin-top:6px;font-size:12px;}

/* ===================================================
   1RM DISPLAY
=================================================== */
.orm-box{
    background:var(--day-bg);border-radius:8px;padding:10px;
    margin-top:8px;text-align:center;font-size:13px;
    border-left:3px solid var(--primary);
}

/* ===================================================
   VOLUME BADGE
=================================================== */
.vol-badge{
    background:var(--day-bg);border-radius:8px;padding:8px 14px;
    font-size:13px;color:var(--text-muted);text-align:center;margin-top:10px;
}

/* ===================================================
   THEME OPTION
=================================================== */
.theme-opt{
    display:flex;align-items:center;gap:14px;padding:14px;
    border-radius:12px;border:2px solid var(--border);cursor:pointer;margin-bottom:10px;transition:all .2s;
}
.theme-opt.active{border-color:var(--primary);box-shadow:var(--glow);}
.theme-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;}

/* ===================================================
   PPL BARS
=================================================== */
.ppl-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ppl-bar-bg{flex:1;background:var(--border);border-radius:10px;height:10px;overflow:hidden;}
.ppl-bar-fill{height:100%;border-radius:10px;transition:width .5s;}

/* ===================================================
   MODALS
=================================================== */
#pr-modal{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.75);z-index:500;align-items:center;justify-content:center;
}
#pr-modal.show{display:flex;}
.pr-content{
    background:var(--card);border-radius:20px;padding:30px 24px;text-align:center;
    border:2px solid var(--primary);box-shadow:var(--glow);max-width:280px;width:90%;
    animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}

#detail-modal{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:var(--bg);z-index:200;padding:20px;overflow-y:auto;box-sizing:border-box;
}
#detail-modal.show{display:block;}

#copy-modal{
    display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:var(--card);padding:20px;border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);width:80%;z-index:300;border:1px solid var(--border);
}

/* ===================================================
   COURSE CARDS
=================================================== */
.course-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.course-card{
    border-radius:16px;padding:18px 14px;text-align:center;
    border:2px solid transparent;cursor:pointer;
    transition:all .2s;position:relative;overflow:hidden;
}
.course-card.active{border-color:currentColor;}
.course-card:active{transform:scale(.97);}
.course-list-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;background:var(--day-bg);border-radius:12px;
    margin-bottom:8px;border-left:3px solid var(--course-col,var(--primary));
}

/* ===================================================
   QUICK LOG SHEET (하단 슬라이드업)
=================================================== */
#quick-log-overlay{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.5);z-index:300;
}
#quick-log-overlay.show{display:block;}
#quick-log-sheet{
    position:fixed;bottom:0;left:0;width:100%;z-index:301;
    background:var(--card);border-radius:24px 24px 0 0;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    border-top:2px solid var(--primary);box-shadow:var(--glow);
    transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1,.6,1);
    max-height:85vh;overflow-y:auto;
}
#quick-log-sheet.show{transform:translateY(0);}
.ql-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}

/* ===================================================
   TOAST NOTIFICATION
=================================================== */
#toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1e293b;color:#fff;padding:12px 24px;border-radius:30px;
    font-size:14px;font-weight:bold;z-index:999;
    opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
body[data-theme="hell"] #toast{background:#3d0a0a;border:1px solid var(--primary);}
body[data-theme="ocean"] #toast{background:#0d1829;border:1px solid var(--primary);}
    </style>
</head>

<body data-theme="light">
<div id="app">
    <header>
        <div class="date-selector">
            <button onclick="setToday()">오늘</button>
            <input type="date" id="global-date" onchange="updateGlobalDate(this.value)">
        </div>
        <h1 id="view-title">성장 캘린더</h1>
    </header>
    <main id="app-content"></main>
    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="dash">🗓️ 홈</button>
        <button class="nav-btn" data-tab="workout">🏋️ 운동</button>
        <button class="nav-btn" data-tab="course">🗂️ 코스</button>
        <button class="nav-btn" data-tab="history">📜 기록</button>
        <button class="nav-btn" data-tab="graph">📈 분석</button>
        <button class="nav-btn" data-tab="mgmt">⚙️ 설정</button>
    </nav>
</div>

<!-- Quick Log Sheet -->
<div id="quick-log-overlay" onclick="closeQuickLog()"></div>
<div id="quick-log-sheet">
    <div class="ql-handle"></div>
    <div id="quick-log-content"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- PR Modal -->
<div id="pr-modal">
    <div class="pr-content">
        <div style="font-size:60px;margin-bottom:8px;">🏆</div>
        <h2 style="color:var(--primary);margin:0 0 10px;">신기록 달성!</h2>
        <p id="pr-text" style="margin:0 0 20px;color:var(--text);font-size:15px;"></p>
        <button class="primary" style="margin-top:0;" onclick="document.getElementById('pr-modal').classList.remove('show')">최고야! 💪</button>
    </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal"></div>

<!-- Copy Modal -->
<div id="copy-modal">
    <p style="font-weight:bold;color:var(--text);">클립보드에 복사되었습니다!</p>
    <p style="font-size:12px;color:var(--text-muted);">Koder에서 새 파일을 만들어 붙여넣고 .json으로 저장하세요.</p>
    <button class="primary" onclick="document.getElementById('copy-modal').style.display='none'">확인</button>
</div>

<script>
/* ==================================================
   UTILITY
================================================== */
function getKSTDate(){
    const now=new Date();
    return new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().split('T')[0];
}
function getData(){return JSON.parse(localStorage.getItem('fit_data')||'{}');}
function saveData(d){localStorage.setItem('fit_data',JSON.stringify(d));}
function getLib(){return JSON.parse(localStorage.getItem('workout_lib')||'[]');}
function getHistory(){return JSON.parse(localStorage.getItem('workout_history')||'{}');}
function getPresets(){return JSON.parse(localStorage.getItem('food_presets')||'{}');}

// 부위 분류 (5부위 기반)
function classifyPPL(w){
    const PARTS=['어깨','가슴','등','하체','팔'];
    if(PARTS.includes(w.part))return w.part;
    return w.part||'기타';
}

// 1RM (Epley)
function calc1RM(weight,reps){
    if(!weight||!reps||reps<=0)return 0;
    if(reps===1)return weight;
    return Math.round(weight*(1+reps/30)*10)/10;
}

// 해당 종목의 역대 최고 중량
function getPR(name){
    let max=0;
    Object.values(getData()).forEach(day=>{
        (day.workout||[]).forEach(w=>{
            if(w.name===name&&w.type==='weight'){
                const wt=parseFloat(w.weight)||0;
                if(wt>max)max=wt;
            }
        });
    });
    return max;
}

// 최근 N회 기록
function getRecentRecords(name,n=3){
    const data=getData();
    const arr=[];
    Object.entries(data).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.name===name&&w.type==='weight')
                arr.push({date,weight:w.weight,sets:w.sets,reps:w.reps});
        });
    });
    return arr.slice(0,n);
}

// 연속 운동일 계산
function calcStreak(){
    const data=getData();
    let streak=0;
    let check=new Date(getKSTDate());
    while(true){
        // KST 기준 날짜 문자열 생성
        const ds=new Date(check.getTime()-check.getTimezoneOffset()*60000).toISOString().split('T')[0];
        if(data[ds]?.workout?.length>0){streak++;check.setDate(check.getDate()-1);}
        else break;
    }
    return streak;
}

// 총 볼륨 (세트×횟수×무게)
function calcVolume(workouts){
    return workouts.reduce((s,w)=>{
        if(w.type!=='weight')return s;
        const wt=Math.abs(parseFloat(w.weight)||0)||1;
        return s+wt*(parseInt(w.sets)||0)*(parseInt(w.reps)||0);
    },0);
}

// 토스트 알림
function showToast(msg,emoji='✅'){
    const t=document.getElementById('toast');
    if(!t)return;
    t.textContent=emoji+' '+msg;
    t.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// PR 모달
function showPR(name,weight){
    document.getElementById('pr-text').textContent=`${name}: ${weight}kg 신기록!`;
    document.getElementById('pr-modal').classList.add('show');
}

/* ==================================================
   THEME
================================================== */
function applyTheme(t){
    document.body.setAttribute('data-theme',t);
    localStorage.setItem('app_theme',t);
}
function loadTheme(){applyTheme(localStorage.getItem('app_theme')||'light');}

/* ==================================================
   ROUTER
================================================== */
window.currentDate=getKSTDate();

document.addEventListener('DOMContentLoaded',()=>{
    loadTheme();
    const input=document.getElementById('global-date');
    if(input)input.value=window.currentDate;

    window.updateGlobalDate=(val)=>{window.currentDate=val;renderActiveTab();};
    window.setToday=()=>{
        const t=getKSTDate();
        document.getElementById('global-date').value=t;
        window.updateGlobalDate(t);
    };

    window.renderActiveTab=()=>{
        const active=document.querySelector('.nav-btn.active');
        const tab=active?.dataset.tab||'dash';
        document.getElementById('app-content').innerHTML='';
        const map={
            dash:['성장 캘린더',renderDashboard],
            workout:['운동 기록',renderWorkout],
            course:['운동 코스',renderCourse],
            history:['전체 기록',renderHistory],
            graph:['변화 분석',renderGraphs],
            mgmt:['설정 및 관리',renderManagement],
        };
        const [title,fn]=map[tab]||map.dash;
        document.getElementById('view-title').innerText=title;
        fn();
    };

    document.querySelectorAll('.nav-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            renderActiveTab();
        });
    });
    renderActiveTab();
});

/* ==================================================
   DASHBOARD
================================================== */
function renderDashboard(){
    const content=document.getElementById('app-content');
    const sel=new Date(window.currentDate);
    const y=sel.getFullYear(),m=sel.getMonth();
    const streak=calcStreak();

    content.innerHTML=`
        ${streak>0?`<div class="streak-banner">
            <div style="font-size:40px;">🔥</div>
            <div><div style="font-size:20px;font-weight:900;">${streak}일 연속 운동 중!</div>
            <div style="font-size:12px;opacity:.8;">오늘도 파이팅! 멈추지 마세요!</div></div>
        </div>`:''}
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <button onclick="changeMonth(-1)" style="border:none;background:var(--day-bg);padding:8px 14px;border-radius:10px;font-size:18px;color:var(--text);cursor:pointer;">◀</button>
                <strong style="font-size:18px;">${y}년 ${m+1}월</strong>
                <button onclick="changeMonth(1)" style="border:none;background:var(--day-bg);padding:8px 14px;border-radius:10px;font-size:18px;color:var(--text);cursor:pointer;">▶</button>
            </div>
            <div class="calendar" id="main-cal"></div>
        </div>
        <div id="day-summary"></div>
        <div id="ppl-advisor"></div>`;

    renderCalendar(y,m);
    renderDaySummary(window.currentDate);
    renderPPLAdvisor();
}

function renderCalendar(y,m){
    const cal=document.getElementById('main-cal');
    const firstDay=new Date(y,m,1).getDay();
    const lastDate=new Date(y,m+1,0).getDate();
    const data=getData();
    const today=getKSTDate();
    let html='';
    for(let i=0;i<firstDay;i++)html+='<div></div>';
    for(let d=1;d<=lastDate;d++){
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const day=data[ds]||{};
        const sel=window.currentDate===ds;
        const isToday=today===ds;
        html+=`<div class="calendar-day${sel?' selected':''}${isToday?' today':''}"
            onclick="window.updateGlobalDate('${ds}');document.getElementById('global-date').value='${ds}';">
            <strong>${d}</strong>
            <div style="margin-top:auto;">
                ${day.weight?`<div style="color:var(--primary);font-size:8px;">${day.weight}k</div>`:''}
                ${day.workout?.length>0?`<div style="color:#6366f1;font-size:8px;">💪${day.workout.length}</div>`:''}
            </div>
        </div>`;
    }
    cal.innerHTML=html;
}

function renderPPLAdvisor(){
    const sec=document.getElementById('ppl-advisor');
    if(!sec)return;
    const data=getData();
    const PARTS=['어깨','가슴','등','하체','팔'];
    const col={어깨:'#a855f7',가슴:'#ef4444',등:'#3b82f6',하체:'#22c55e',팔:'#f59e0b'};
    const emo={어깨:'🏔️',가슴:'💪',등:'🔙',하체:'🦵',팔:'🤜'};

    // 최근 7일 집계
    const counts={어깨:0,가슴:0,등:0,하체:0,팔:0};
    const lastDone={어깨:null,가슴:null,등:null,하체:null,팔:null};
    for(let i=6;i>=0;i--){
        const d=new Date(getKSTDate());d.setDate(d.getDate()-i);
        const ds=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().split('T')[0];
        (data[ds]?.workout||[]).forEach(w=>{
            const p=classifyPPL(w);
            if(counts[p]!==undefined){
                counts[p]++;
                if(lastDone[p]===null||i<lastDone[p])lastDone[p]=i;
            }
        });
    }

    // 회복 상태 (48시간)
    const REST_DAYS=2;
    const resting={};
    const available=[];
    PARTS.forEach(cat=>{
        const d=lastDone[cat];
        if(d===null||d>=REST_DAYS){resting[cat]=false;available.push(cat);}
        else resting[cat]=true;
    });

    // 추천 부위
    let rec=null,recReason='';
    const allResting=available.length===0;
    if(!allResting){
        available.sort((a,b)=>{
            const da=lastDone[a]===null?999:lastDone[a];
            const db=lastDone[b]===null?999:lastDone[b];
            return db-da;
        });
        rec=available[0];
        const days=lastDone[rec];
        recReason=days===null?'최근 7일간 안 했어요!':`마지막으로 한 지 ${days}일 지났어요 ✅`;
    }else{
        const sorted=Object.entries(lastDone).filter(e=>e[1]!==null).sort((a,b)=>b[1]-a[1]);
        rec=sorted[0]?.[0]||'가슴';
        recReason='모든 부위 회복 중 — 오늘은 완전 휴식 추천 😴';
    }

    sec.innerHTML=`<div class="card">
        <h4 style="margin:0 0 14px;">🎯 오늘의 추천 루틴</h4>
        ${allResting
            ?`<div style="background:#fef3c7;border-radius:12px;padding:14px;border-left:4px solid #f59e0b;margin-bottom:16px;">
                <div style="font-size:18px;font-weight:900;color:#92400e;">😴 오늘은 휴식 추천!</div>
                <div style="font-size:12px;color:#78350f;margin-top:4px;">모든 부위가 아직 48시간 회복 기간이에요.</div></div>`
            :`<div style="background:var(--day-bg);border-radius:12px;padding:14px;border-left:4px solid ${col[rec]};margin-bottom:16px;">
                <div style="font-size:20px;font-weight:900;color:${col[rec]};">${emo[rec]} ${rec} 추천!</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${recReason}</div></div>`}

        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">최근 7일 현황 · 탭하면 운동 목록 ↓</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;">
            ${PARTS.slice(0,3).map(cat=>`
            <button onclick="showPPLDetail('${cat}')"
                style="padding:10px 4px;border-radius:12px;border:2px solid ${resting[cat]?'#94a3b8':col[cat]};
                background:${resting[cat]?'var(--day-bg)':col[cat]+'22'};
                color:${resting[cat]?'var(--text-muted)':col[cat]};
                font-weight:900;font-size:12px;cursor:pointer;">
                ${emo[cat]} ${cat}<br>
                <span style="font-size:10px;font-weight:normal;">${counts[cat]}회</span><br>
                ${resting[cat]
                    ?`<span style="font-size:9px;color:#92400e;background:#fef3c7;border-radius:4px;padding:1px 3px;">💤 회복중</span>`
                    :`<span style="font-size:9px;color:#166534;background:#dcfce7;border-radius:4px;padding:1px 3px;">✅ 준비</span>`}
            </button>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;">
            ${PARTS.slice(3).map(cat=>`
            <button onclick="showPPLDetail('${cat}')"
                style="padding:10px 4px;border-radius:12px;border:2px solid ${resting[cat]?'#94a3b8':col[cat]};
                background:${resting[cat]?'var(--day-bg)':col[cat]+'22'};
                color:${resting[cat]?'var(--text-muted)':col[cat]};
                font-weight:900;font-size:12px;cursor:pointer;">
                ${emo[cat]} ${cat}<br>
                <span style="font-size:10px;font-weight:normal;">${counts[cat]}회</span><br>
                ${resting[cat]
                    ?`<span style="font-size:9px;color:#92400e;background:#fef3c7;border-radius:4px;padding:1px 3px;">💤 회복중</span>`
                    :`<span style="font-size:9px;color:#166534;background:#dcfce7;border-radius:4px;padding:1px 3px;">✅ 준비</span>`}
            </button>`).join('')}
        </div>
        <div id="ppl-detail-box"></div>
        <div style="font-size:11px;color:var(--text-muted);padding:8px;background:var(--day-bg);border-radius:8px;margin-top:4px;">
            💡 같은 부위는 <strong>48시간</strong> 후 다시 운동하세요.
        </div>
    </div>`;

    if(rec) setTimeout(()=>showPPLDetail(rec),50);
}

window.showPPLDetail=function(cat){
    const box=document.getElementById('ppl-detail-box');
    if(!box)return;
    const colMap={어깨:'#a855f7',가슴:'#ef4444',등:'#3b82f6',하체:'#22c55e',팔:'#f59e0b'};
    const col=colMap[cat]||'var(--primary)';
    const data=getData();
    const hist=getHistory();
    const courseEx=(COURSE_DATA[cat]?.exercises)||[];

    // 내 기록에서 해당 부위 운동 추출 (최근 기록 우선)
    const mySeen={};
    Object.entries(data).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.type!=='weight')return;
            if(classifyPPL(w)===cat&&!mySeen[w.name]){
                mySeen[w.name]={name:w.name,weight:w.weight,sets:w.sets,reps:w.reps,date:date.slice(5)};
            }
        });
    });

    // 코스 순서대로 표시 (내 기록 있으면 무게 표시, 없으면 NEW)
    const courseItems=courseEx.map(ex=>{
        const my=mySeen[ex.name]||hist[ex.name];
        return {...ex,my};
    });

    // 코스에 없는 내 기록도 추가
    const courseNames=new Set(courseEx.map(e=>e.name));
    const extra=Object.values(mySeen).filter(m=>!courseNames.has(m.name));

    box.style.opacity='0';
    box.style.transform='translateY(-6px)';
    box.innerHTML=`
        <div style="border-top:2px dashed var(--border);margin-bottom:12px;"></div>
        <div style="font-size:12px;font-weight:bold;color:${col};margin-bottom:10px;">🗂️ ${cat} 코스 (추천 순서)</div>
        ${courseItems.map((ex,i)=>`
        <div style="display:flex;justify-content:space-between;align-items:center;
            padding:11px 12px;background:var(--day-bg);border-radius:10px;margin-bottom:6px;
            border-left:3px solid ${ex.my?col:'var(--border)'};">
            <div>
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px;">
                    <span style="background:${col}22;color:${col};border-radius:4px;padding:1px 6px;font-weight:bold;">${i+1}</span>
                </div>
                <div style="font-weight:bold;font-size:14px;">${ex.name}
                    ${!ex.my?'<span style="font-size:10px;color:var(--text-muted);background:var(--border);border-radius:4px;padding:1px 5px;margin-left:4px;">NEW</span>':''}
                </div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">💬 ${ex.tip}</div>
                ${ex.my?`<div style="font-size:11px;color:${col};margin-top:3px;">
                    최근 ${ex.my.date||''} · ${ex.my.weight}kg × ${ex.my.sets}세트 × ${ex.my.reps}회
                </div>`:''}
            </div>
            ${ex.my?`<div style="text-align:right;flex-shrink:0;margin-left:10px;">
                <div style="font-size:10px;color:var(--text-muted);">추정 1RM</div>
                <strong style="font-size:15px;color:${col};">${calc1RM(parseFloat(ex.my.weight),parseInt(ex.my.reps))}kg</strong>
            </div>`:''}
        </div>`).join('')}
        ${extra.length>0?`
        <div style="font-size:12px;color:var(--text-muted);margin:12px 0 8px;">📌 기타 기록된 ${cat} 운동</div>
        ${extra.map(ex=>`
        <div style="padding:10px 12px;background:var(--day-bg);border-radius:10px;margin-bottom:6px;
            border-left:3px dashed ${col};">
            <div style="font-weight:bold;font-size:13px;">${ex.name}</div>
            <div style="font-size:11px;color:${col};margin-top:2px;">
                최근 ${ex.date} · ${ex.weight}kg × ${ex.sets}세트 × ${ex.reps}회
            </div>
        </div>`).join('')}`:''}
    `;
    requestAnimationFrame(()=>{
        box.style.transition='all .3s ease';
        box.style.opacity='1';
        box.style.transform='translateY(0)';
    });
};

window.openDetail=function(ds,id){
    const data=getData();
    const w=(data[ds]?.workout||[]).find(x=>x.id===id);
    if(!w)return;
    const modal=document.getElementById('detail-modal');
    const orm=w.type==='weight'?calc1RM(parseFloat(w.weight),parseInt(w.reps)):0;
    const records=getRecentRecords(w.name,5);
    modal.innerHTML=`
        <button onclick="document.getElementById('detail-modal').classList.remove('show')"
            style="background:var(--day-bg);border:none;padding:10px 16px;border-radius:8px;color:var(--text);cursor:pointer;font-weight:bold;margin-bottom:16px;">← 닫기</button>
        <div class="card">
            <h2 style="color:var(--primary);margin:0 0 4px;">${w.name}</h2>
            <p style="color:var(--text-muted);margin:0 0 16px;">${w.part} | ${ds}</p>
            <div style="background:var(--day-bg);padding:14px;border-radius:10px;margin-bottom:14px;">
                ${w.type==='weight'
                    ?`<div style="font-size:18px;font-weight:bold;">${w.weight}kg × ${w.sets}세트 × ${w.reps}회</div>
                      ${orm>0?`<div style="color:var(--primary);font-size:13px;margin-top:6px;">추정 1RM: <strong>${orm}kg</strong></div>`:''}`
                    :`${w.time}분 / ${w.dist}km`}
            </div>
            ${records.length>0?`<h5 style="margin:0 0 10px;">📊 최근 기록</h5>
            <div style="font-size:12px;">
                ${records.map((r,i)=>{
                    const prev=records[i+1];
                    const up=prev&&parseFloat(r.weight)>parseFloat(prev.weight);
                    const dn=prev&&parseFloat(r.weight)<parseFloat(prev.weight);
                    return `<div style="display:flex;justify-content:space-between;padding:8px;background:var(--day-bg);border-radius:8px;margin-bottom:5px;">
                        <span style="color:var(--text-muted);">${r.date}</span>
                        <span style="font-weight:bold;">${r.weight}kg × ${r.sets}×${r.reps}
                            ${up?'<span style="color:var(--success);">↑</span>':dn?'<span style="color:var(--danger);">↓</span>':''}
                        </span>
                    </div>`;
                }).join('')}
            </div>`:''}
            <h5 style="margin:14px 0 8px;">📝 메모</h5>
            <div style="background:var(--day-bg);padding:14px;border-radius:10px;min-height:70px;white-space:pre-wrap;font-size:14px;">${w.memo||'기록 없음'}</div>
        </div>`;
    modal.classList.add('show');
};

window.update1RM=function(){
    const w=parseFloat(document.getElementById('work-weight')?.value);
    const r=parseInt(document.getElementById('work-reps')?.value);
    const d=document.getElementById('orm-display');
    if(!d)return;
    if(w&&r&&w>0&&r>0){
        const orm=calc1RM(w,r);
        d.style.display='block';
        d.innerHTML=`추정 1RM: <strong style="color:var(--primary);font-size:16px;">${orm}kg</strong> <span style="color:var(--text-muted);">(Epley 공식)</span>`;
    }else{d.style.display='none';}
};
window.toggleWorkoutType=function(t){
    document.getElementById('weight-fields').style.display=t==='weight'?'block':'none';
    document.getElementById('cardio-fields').style.display=t==='cardio'?'block':'none';
};

function saveWork(e){
    e.preventDefault();
    const ds=window.currentDate;
    const data=getData();
    if(!data[ds])data[ds]={};
    if(!data[ds].workout)data[ds].workout=[];

    const type=document.getElementById('work-type').value;
    const name=type==='weight'?document.getElementById('work-name').value:document.getElementById('cardio-name').value;
    const entry={id:'W'+Date.now(),type,name,memo:document.getElementById('work-memo').value};

    let isPR=false;
    if(type==='weight'){
        entry.part=document.getElementById('work-part').value;
        entry.weight=document.getElementById('work-weight').value;
        entry.sets=document.getElementById('work-sets').value;
        entry.reps=document.getElementById('work-reps').value;
        // PR 체크 (저장 전 기준)
        const prevMax=getPR(name);
        if(parseFloat(entry.weight)>prevMax&&prevMax>0)isPR=true;
        // history 저장 - 새 무게가 이전보다 크면 항상 업데이트
        const hist=getHistory();
        const prevHist=hist[name];
        const newWt=parseFloat(entry.weight)||0;
        const prevWt=parseFloat(prevHist?.weight)||0;
        if(!prevHist||newWt>prevWt){
            hist[name]={part:entry.part,weight:entry.weight,sets:entry.sets,reps:entry.reps};
            localStorage.setItem('workout_history',JSON.stringify(hist));
            if(prevHist&&newWt>prevWt)showToast(`증량! ${prevWt}→${newWt}kg 🎉`,'💪');
        }else{
            // 무게 같거나 낮아도 세트/횟수는 업데이트
            hist[name]={part:entry.part,weight:entry.weight,sets:entry.sets,reps:entry.reps};
            localStorage.setItem('workout_history',JSON.stringify(hist));
        }
    }else{
        entry.part='유산소';
        entry.time=document.getElementById('cardio-time').value;
        entry.dist=document.getElementById('cardio-dist').value;
    }
    // 수정 모드면 기존 항목 교체, 아니면 추가
    const form=document.getElementById('work-form');
    const editId=form?.dataset.editId;
    if(editId){
        const idx=data[ds].workout.findIndex(x=>x.id===editId);
        if(idx>=0){entry.id=editId;data[ds].workout[idx]=entry;}
        else data[ds].workout.push(entry);
        delete form.dataset.editId;
    }else{
        data[ds].workout.push(entry);
    }
    saveData(data);

    const lib=getLib();
    if(!lib.includes(name)){lib.push(name);localStorage.setItem('workout_lib',JSON.stringify(lib));}

    if(isPR)showPR(name,entry.weight);
    else showToast('저장되었습니다!');
    renderActiveTab();
}

window.editWorkoutItem=function(id){
    const data=getData();
    const w=(data[window.currentDate]?.workout||[]).find(x=>x.id===id);
    if(!w)return;
    // 폼에 값 채우기
    document.getElementById('work-type').value=w.type||'weight';
    toggleWorkoutType(w.type||'weight');
    if(w.type==='cardio'){
        document.getElementById('cardio-name').value=w.name||'';
        document.getElementById('cardio-time').value=w.time||'';
        document.getElementById('cardio-dist').value=w.dist||'';
    }else{
        document.getElementById('work-name').value=w.name||'';
        document.getElementById('work-part').value=w.part||'가슴';
        document.getElementById('work-weight').value=w.weight||'';
        document.getElementById('work-sets').value=w.sets||'';
        document.getElementById('work-reps').value=w.reps||'';
        update1RM();
    }
    document.getElementById('work-memo').value=w.memo||'';
    // 수정 모드 표시
    const form=document.getElementById('work-form');
    form.dataset.editId=id;
    form.querySelector('button[type=submit]').textContent='수정 완료';
    form.querySelector('h3').innerHTML='✏️ 운동 수정 중';
    form.scrollIntoView({behavior:'smooth'});
};

window.deleteWorkoutItem=function(id){
    if(!confirm('이 운동 기록을 삭제할까요?'))return;
    const data=getData();
    data[window.currentDate].workout=data[window.currentDate].workout.filter(w=>w.id!==id);
    saveData(data);renderActiveTab();
};

        (day.workout||[]).forEach(w=>{

        const orm=calc1RM(w,r);

window.saveQuickLog=function(name,part,col){
    const weight=document.getElementById('ql-weight')?.value;
    const sets=document.getElementById('ql-sets')?.value;
    const reps=document.getElementById('ql-reps')?.value;
    const memo=document.getElementById('ql-memo')?.value||'';
    if(!weight||!sets||!reps){showToast('중량·세트·횟수를 입력해주세요','⚠️');return;}

    const ds=window.currentDate;
    const data=getData();
    if(!data[ds])data[ds]={};
    if(!data[ds].workout)data[ds].workout=[];

    // PR 체크
    const prevMax=getPR(name);
    const isPR=parseFloat(weight)>prevMax&&prevMax>0;

    const entry={id:'W'+Date.now(),type:'weight',name,part,weight,sets,reps,memo};
    data[ds].workout.push(entry);
    saveData(data);

    // workout_lib 업데이트
    const lib=getLib();
    if(!lib.includes(name)){lib.push(name);localStorage.setItem('workout_lib',JSON.stringify(lib));}

    // history 업데이트 (증량 시)
    const hist=getHistory();
    const prevWt=parseFloat(hist[name]?.weight)||0;
    const newWt=parseFloat(weight);
    hist[name]={part,weight,sets,reps};
    localStorage.setItem('workout_history',JSON.stringify(hist));

    closeQuickLog();

    if(isPR){showPR(name,weight);}
    else if(newWt>prevWt&&prevWt>0){showToast(`증량! ${prevWt}→${newWt}kg`,'💪');}
    else{showToast(`${name} 기록 완료!`);}

    // 현재 탭이 코스면 재렌더 안 해도 됨 (기록만 저장)
    // 홈 탭이면 요약 갱신
    const activeTab=document.querySelector('.nav-btn.active')?.dataset.tab;
    if(activeTab==='dash')renderActiveTab();
};

function renderHistory(){
    const content=document.getElementById('app-content');
    content.innerHTML=`
        <div class="card" style="padding:12px;">
            <input type="text" id="history-search" placeholder="🔍 운동명 검색..." 
                style="margin:0;" oninput="searchHistory(this.value)">
        </div>
        <div class="filter-group">
            ${['전체','가슴','등','어깨','하체','팔','유산소'].map(p=>
                `<button class="filter-btn${p==='전체'?' active':''}" onclick="filterHistory('${p}',this)">${p}</button>`
            ).join('')}
        </div>
        <div id="history-list"></div>`;
    filterHistory('전체');
    window._historySearch='';
}

window.filterHistory=function(part,btn){
    if(btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
    const data=getData();
    let all=[];
    Object.entries(data).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>all.push({...w,date}));
    });
    all.sort((a,b)=>b.date.localeCompare(a.date));
    const q=(window._historySearch||'').trim().toLowerCase();
    let filtered=part==='전체'?all:all.filter(w=>w.part===part);
    if(q) filtered=filtered.filter(w=>(w.name||'').toLowerCase().includes(q));
    const listDiv=document.getElementById('history-list');
    if(filtered.length===0){listDiv.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:40px;">기록이 없습니다.</p>';return;}

    // 종목별 최고 중량 계산
    const maxByEx={};
    all.forEach(w=>{if(w.type==='weight'){const wt=parseFloat(w.weight)||0;if(!maxByEx[w.name]||wt>maxByEx[w.name])maxByEx[w.name]=wt;}});

    listDiv.innerHTML=filtered.map(w=>{
        const isPR=w.type==='weight'&&parseFloat(w.weight)>=(maxByEx[w.name]||0);
        return `<div class="card" style="padding:15px;">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:5px;">${w.date}</div>
            <strong>[${w.part}] ${w.name}</strong>${isPR?'<span class="pr-badge">🏆 PR</span>':''}
            <div style="font-size:13px;color:var(--text-muted);margin-top:5px;">
                ${w.type==='weight'?`${w.weight}kg | ${w.sets}세트 | ${w.reps}회`:`${w.time||0}분${w.dist&&w.dist>0?' | '+w.dist+'km':''}`}
            </div>
            ${w.memo?`<div style="font-size:12px;color:var(--text-muted);margin-top:8px;font-style:italic;">"${w.memo}"</div>`:''}
            <button class="btn-sm btn-edit" style="margin-top:10px;" onclick="goToEdit('${w.date}','${w.id}')">날짜로 이동</button>
        </div>`;
    }).join('');
};

window.searchHistory=function(q){
    window._historySearch=q;
    const activeBtn=document.querySelector('.filter-btn.active');
    const part=activeBtn?activeBtn.textContent:'전체';
    filterHistory(part);
};

window.goToEdit=function(date,id){
    window.currentDate=date;
    document.getElementById('global-date').value=date;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('[data-tab="workout"]').classList.add('active');
    renderActiveTab();showToast('해당 날짜로 이동!','📅');
};

function renderBodyGraphs(days){
    const gc=document.getElementById('graph-content');
    gc.innerHTML=`

            <button onclick="renderBodyGraphs(7)" class="btn-sm" id="btn-7" style="flex:1;background:var(--primary);color:#fff;">최근 7일</button>

`;

    setTimeout(()=>{
        if(charts.w)charts.w.destroy();
        const data=getData();const labels=[],weights=[];
        for(let i=days-1;i>=0;i--){
            const d=new Date(getKSTDate());d.setDate(d.getDate()-i);

            options:opts
        });

    },100);
}

function renderBig3(){
    const data=getData();
    // 3대 운동 별칭 처리
    const BIG3={
        '벤치 프레스':['벤치 프레스','벤치프레스'],
        '데드 리프트':['데드 리프트','데드리프트'],
        '스쿼트':['스쿼트'],
    };
    const col={'벤치 프레스':'#3b82f6','데드 리프트':'#ef4444','스쿼트':'#22c55e'};
    const emo={'벤치 프레스':'🫸','데드 리프트':'💀','스쿼트':'🦵'};

    // 각 운동별 날짜-최고중량 집계
    const history={}; // {운동명: [{date, weight}]}
    Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.type!=='weight'||!parseFloat(w.weight))return;
            const wt=parseFloat(w.weight);
            if(wt<=0)return;
            for(const [canonical,aliases] of Object.entries(BIG3)){
                if(aliases.includes(w.name)){
                    if(!history[canonical])history[canonical]=[];
                    // 같은 날짜면 최고값만 유지
                    const last=history[canonical][history[canonical].length-1];
                    if(last&&last.date===date){if(wt>last.weight)last.weight=wt;}
                    else history[canonical].push({date:date.slice(5),weight:wt,fullDate:date});
                    break;
                }
            }
        });
    });

    // 3대 합계 (각 최고 중량 기준)
    const prs={};
    for(const name of Object.keys(BIG3)){
        const arr=history[name]||[];
        prs[name]=arr.length>0?Math.max(...arr.map(r=>r.weight)):0;
    }
    const total=Object.values(prs).reduce((s,v)=>s+v,0);

    const gc=document.getElementById('graph-content');
    gc.innerHTML=`
        <div class="card">
            <h4 style="margin:0 0 14px;">🏆 3대 운동 합계</h4>
            <div style="text-align:center;padding:10px 0;">
                <div style="font-size:48px;font-weight:900;color:var(--primary);">${total}kg</div>
                <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">벤치 + 데드 + 스쿼트 최고 중량 합산</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px;">
                ${Object.entries(prs).map(([name,pr])=>`
                <div style="text-align:center;padding:12px 6px;background:var(--day-bg);border-radius:12px;border-top:3px solid ${col[name]};">
                    <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">${emo[name]} ${name.replace(' 프레스','').replace(' 리프트','')}</div>
                    <div style="font-size:22px;font-weight:900;color:${col[name]};">${pr>0?pr+'kg':'미기록'}</div>
                </div>`).join('')}
            </div>
        </div>

        ${Object.entries(BIG3).map(([name])=>{
            const arr=history[name]||[];
            const pr=prs[name];
            const first=arr[0];
            const last=arr[arr.length-1];
            const diff=first&&last?Math.round((last.weight-first.weight)*10)/10:0;
            return `
        <div class="card">
            <h4 style="margin:0 0 4px;color:${col[name]};">${emo[name]} ${name}</h4>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">총 ${arr.length}회 기록</div>
            ${arr.length===0?`<p style="color:var(--text-muted);text-align:center;padding:20px;">기록 없음</p>`:`
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;text-align:center;">
                <div style="background:var(--day-bg);border-radius:10px;padding:10px;">
                    <div style="font-size:18px;font-weight:900;">${first.weight}kg</div>
                    <div style="font-size:10px;color:var(--text-muted);">시작</div>
                </div>
                <div style="background:var(--day-bg);border-radius:10px;padding:10px;">
                    <div style="font-size:18px;font-weight:900;color:${diff>=0?'var(--success)':'var(--danger)'};">${diff>=0?'+':''}${diff}kg</div>
                    <div style="font-size:10px;color:var(--text-muted);">성장</div>
                </div>
                <div style="background:var(--day-bg);border-radius:10px;padding:10px;">
                    <div style="font-size:18px;font-weight:900;color:${col[name]};">${pr}kg</div>
                    <div style="font-size:10px;color:var(--text-muted);">최고 🏆</div>
                </div>
            </div>
            <div style="height:160px;"><canvas id="big3Chart_${name.replace(/ /g,'_')}"></canvas></div>
            <div style="margin-top:10px;font-size:11px;color:var(--text-muted);">최근 기록 ${arr.slice(-5).map(r=>`<span style="display:inline-block;background:var(--day-bg);border-radius:6px;padding:2px 8px;margin:2px;font-weight:bold;">${r.date} ${r.weight}kg</span>`).join('')}</div>
            `}
        </div>`;
        }).join('')}`;

    // 차트 렌더링
    setTimeout(()=>{
        const isDark=document.body.getAttribute('data-theme')!=='light';
        const gc2={color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)'};
        const tc=isDark?'#888':'#666';
        for(const name of Object.keys(BIG3)){
            const arr=history[name]||[];
            if(arr.length<2)continue;
            const canvasId='big3Chart_'+name.replace(/ /g,'_');
            const canvas=document.getElementById(canvasId);
            if(!canvas)continue;
            if(charts['big3_'+name])charts['big3_'+name].destroy();
            const maxW=Math.max(...arr.map(r=>r.weight));
            charts['big3_'+name]=new Chart(canvas.getContext('2d'),{
                type:'line',
                data:{
                    labels:arr.map(r=>r.date),
                    datasets:[{
                        data:arr.map(r=>r.weight),
                        borderColor:col[name],
                        backgroundColor:col[name]+'22',
                        fill:true,tension:.3,
                        pointRadius:5,
                        pointBackgroundColor:arr.map(r=>r.weight===maxW?'#fff':col[name]),
                        pointBorderColor:arr.map(r=>r.weight===maxW?col[name]:'transparent'),
                        pointBorderWidth:2,
                    }]
                },
                options:{
                    responsive:true,maintainAspectRatio:false,
                    plugins:{legend:{display:false},tooltip:{callbacks:{
                        label:ctx=>`${ctx.raw}kg${ctx.raw===maxW?' 🏆':''}`
                    }}},
                    scales:{
                        x:{grid:gc2,ticks:{color:tc,maxTicksLimit:6}},
                        y:{grid:gc2,ticks:{color:tc,callback:v=>v+'kg'}}
                    }
                }
            });
        }
    },100);
}

window.applyTheme=applyTheme;

function getBackupData(){
    const keys=['fit_data','workout_lib','workout_history','food_presets'];
    const b={};keys.forEach(k=>b[k]=JSON.parse(localStorage.getItem(k)||'{}'));
    return JSON.stringify(b,null,2);
}
function updateBackupTime(){
    const n=new Date();
    const t=`${n.getMonth()+1}/${n.getDate()} ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
    localStorage.setItem('last_backup_time',t);
}
window.exportData=function(){
    const blob=new Blob([getBackupData()],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`FitTrack_Backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    updateBackupTime();
};
window.copyData=function(){
    const el=document.createElement('textarea');el.value=getBackupData();
    document.body.appendChild(el);el.select();document.execCommand('copy');
    document.body.removeChild(el);
    updateBackupTime();
    document.getElementById('copy-modal').style.display='block';
};
window.importData=function(input){
    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(e)=>{
        try{
            const data=JSON.parse(e.target.result);
            if(confirm('기존 데이터를 덮어쓰고 불러오시겠습니까?')){
                Object.keys(data).forEach(k=>localStorage.setItem(k,JSON.stringify(data[k])));
                showToast('복구 완료!','📂');location.reload();
            }
        }catch{alert('잘못된 파일 형식입니다.');}
    };
    reader.readAsText(file);
};
window.clearData=function(){
    if(confirm('정말 모든 기록을 영구 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')){
        const theme=localStorage.getItem('app_theme');
        localStorage.clear();
        if(theme)localStorage.setItem('app_theme',theme);
        location.reload();
    }
};
window.renderManagement=renderManagement;

/* ==================================================
   SERVICE WORKER
================================================== */
if('serviceWorker'in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>

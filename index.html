<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fit-Track Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitTrack">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
/* ===================================================
   THEME VARIABLES
=================================================== */
:root {
    --primary:#2563eb; --secondary:#3b82f6; --success:#059669; --danger:#dc2626;
    --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --text-muted:#64748b;
    --border:#e2e8f0; --shadow:0 4px 20px rgba(0,0,0,0.08); --glow:none;
    --nav-bg:#ffffff; --nav-inactive:#94a3b8; --input-bg:#f1f5f9; --day-bg:#f1f5f9;
}
body[data-theme="hell"] {
    --primary:#ff0000; --secondary:#ff4800; --success:#ff8000; --danger:#991b1b;
    --bg:#000; --card:#0a0000; --text:#fff1f1; --text-muted:#9a6060;
    --border:#3d0a0a; --shadow:0 10px 40px -10px rgba(255,0,0,0.4);
    --glow:0 0 15px rgba(255,0,0,0.6),0 0 30px rgba(255,72,0,0.4);
    --nav-bg:#000; --nav-inactive:#5a2d2d; --input-bg:#140404; --day-bg:#110303;
}
body[data-theme="ocean"] {
    --primary:#00d4ff; --secondary:#0ea5e9; --success:#34d399; --danger:#f87171;
    --bg:#070d1a; --card:#0d1829; --text:#e0f2fe; --text-muted:#60a5b4;
    --border:#1e3a5f; --shadow:0 10px 40px -10px rgba(0,212,255,0.15);
    --glow:0 0 20px rgba(0,212,255,0.25); --nav-bg:#070d1a; --nav-inactive:#2a5a6e;
    --input-bg:#0d1829; --day-bg:#0d1829;
}
body[data-theme="violet"] {
    --primary:#a855f7; --secondary:#ec4899; --success:#34d399; --danger:#f87171;
    --bg:#0b0616; --card:#150d24; --text:#f3e8ff; --text-muted:#8b7aa8;
    --border:#3b2a5e; --shadow:0 10px 40px -10px rgba(168,85,247,0.25);
    --glow:0 0 20px rgba(168,85,247,0.3); --nav-bg:#0b0616; --nav-inactive:#4a3a6e;
    --input-bg:#150d24; --day-bg:#150d24;
}

/* ===================================================
   BASE
=================================================== */
*{box-sizing:border-box;}
body{
    font-family:-apple-system,system-ui,sans-serif;
    margin:0;background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;transition:background .3s,color .3s;
}
body[data-theme="hell"]{background-image:radial-gradient(circle at center bottom,#3a0a0a 0%,#000 80%);background-attachment:fixed;}
body[data-theme="ocean"]{background-image:radial-gradient(circle at 30% 70%,#0a1f3d 0%,#070d1a 70%);background-attachment:fixed;}
body[data-theme="violet"]{background-image:radial-gradient(circle at 70% 20%,#2a1052 0%,#0b0616 70%);background-attachment:fixed;}

#app{display:flex;flex-direction:column;height:100vh;}

header{
    background:var(--card);
    backdrop-filter:blur(10px);
    padding:calc(12px + env(safe-area-inset-top)) 12px 12px;
    border-bottom:2px solid var(--primary);
    box-shadow:var(--glow);
    position:sticky;top:0;z-index:100;
}
body[data-theme="hell"] header,body[data-theme="ocean"] header{background:rgba(0,0,0,0.92);}
body[data-theme="violet"] header{background:rgba(11,6,22,0.92);}

h1{margin:0;font-size:18px;text-align:center;color:var(--text);}
h3,h4,h5{color:var(--text);}

.date-selector{display:flex;justify-content:center;gap:10px;margin-bottom:5px;}
.date-selector button{
    padding:6px 16px;border-radius:20px;
    border:2px solid var(--primary);background:var(--card);
    color:var(--primary);font-weight:900;cursor:pointer;
}
.date-selector input{
    border:1px solid var(--border);font-weight:bold;
    background:var(--card);color:var(--text);
    padding:5px 10px;border-radius:8px;font-size:15px;
}

#app-content{flex:1;overflow-y:auto;padding:15px 15px 100px;-webkit-overflow-scrolling:touch;}

/* ===================================================
   CARD
=================================================== */
.card{
    background:var(--card);border-radius:16px;padding:16px;
    margin-bottom:15px;border:1px solid var(--border);
    box-shadow:var(--shadow);position:relative;overflow:hidden;
}
body[data-theme="hell"] .card::before,
body[data-theme="ocean"] .card::before{
    content:'';position:absolute;top:0;left:0;width:100%;height:2px;
    background:linear-gradient(90deg,transparent,var(--primary),transparent);
}
body[data-theme="violet"] .card::before{
    content:'';position:absolute;top:0;left:0;width:100%;height:2px;
    background:linear-gradient(90deg,transparent,var(--primary),var(--secondary),transparent);
}

/* ===================================================
   NAVIGATION
=================================================== */
.bottom-nav{
    position:fixed;bottom:0;width:100%;height:75px;
    background:var(--nav-bg);display:flex;
    border-top:2px solid var(--primary);
    padding-bottom:env(safe-area-inset-bottom);
    z-index:100;box-shadow:var(--glow);
}
.nav-btn{
    flex:1;border:none;background:none;font-size:10px;
    color:var(--nav-inactive);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;
}
.nav-btn.active{color:var(--primary);font-weight:bold;}
body[data-theme="hell"] .nav-btn.active,
body[data-theme="ocean"] .nav-btn.active{text-shadow:0 0 10px var(--primary);}
body[data-theme="violet"] .nav-btn.active{text-shadow:0 0 10px var(--primary);}

/* ===================================================
   FORM ELEMENTS
=================================================== */
label{font-size:13px;color:var(--text-muted);margin-top:12px;display:block;}
input,select,textarea{
    width:100%;padding:12px;
    border:2px solid var(--border);border-radius:10px;
    font-size:16px;margin-top:5px;
    background:var(--input-bg);color:var(--text);
}
input:focus,select:focus,textarea:focus{border-color:var(--primary);outline:none;box-shadow:var(--glow);}
select option{background:var(--input-bg);color:var(--text);}

button.primary{
    width:100%;padding:16px;
    background:linear-gradient(135deg,var(--secondary),var(--primary));
    color:#fff;border:none;border-radius:12px;font-weight:bold;
    margin-top:15px;cursor:pointer;
    text-transform:uppercase;letter-spacing:1px;box-shadow:var(--glow);
}
.btn-sm{padding:8px 12px;border-radius:8px;border:none;font-size:12px;font-weight:bold;cursor:pointer;}
.btn-edit{background:var(--day-bg);color:var(--secondary);border:1px solid var(--secondary);}
.btn-del{background:var(--day-bg);color:var(--danger);border:1px solid var(--danger);}

/* ===================================================
   CALENDAR
=================================================== */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:15px;}
.calendar-day{
    min-height:62px;border:1px solid var(--border);border-radius:10px;
    padding:5px;font-size:11px;background:var(--day-bg);
    display:flex;flex-direction:column;cursor:pointer;
    transition:border-color .2s;
}
.calendar-day strong{color:var(--primary);}
.calendar-day.selected{border:2px solid var(--primary);box-shadow:var(--glow);}
.calendar-day.today strong{color:var(--success);}

/* ===================================================
   FILTER BUTTONS
=================================================== */
.filter-group{display:flex;gap:8px;overflow-x:auto;padding:5px 0 15px;-webkit-overflow-scrolling:touch;}
.filter-btn{
    padding:8px 16px;border-radius:10px;border:1px solid var(--border);
    background:var(--card);color:var(--text);white-space:nowrap;
    font-size:13px;font-weight:bold;cursor:pointer;
}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--glow);}

/* ===================================================
   GRAPH TABS
=================================================== */
.tab-group{display:flex;gap:6px;background:var(--day-bg);border-radius:12px;padding:6px;margin-bottom:15px;}
.tab-option{flex:1;padding:8px;border-radius:8px;border:none;background:none;font-size:13px;color:var(--text-muted);cursor:pointer;font-weight:bold;}
.tab-option.active{background:var(--primary);color:#fff;}

/* ===================================================
   PR BADGE
=================================================== */
.pr-badge{
    display:inline-block;background:gold;color:#7a5000;
    border-radius:4px;padding:1px 6px;font-size:10px;font-weight:bold;margin-left:5px;
}

/* ===================================================
   STREAK BANNER
=================================================== */
.streak-banner{
    background:linear-gradient(135deg,var(--secondary),var(--primary));
    border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;
    margin-bottom:14px;color:#fff;box-shadow:var(--glow);
}

/* ===================================================
   PROTEIN RING
=================================================== */
.ring-wrap{display:flex;align-items:center;justify-content:center;gap:24px;padding:8px 0;}
.ring-svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
.ring-prog{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dasharray .6s ease;}

/* ===================================================
   RECENT HISTORY BOX
=================================================== */
.hist-box{background:var(--day-bg);border-radius:10px;padding:10px;margin-top:6px;font-size:12px;}

/* ===================================================
   1RM DISPLAY
=================================================== */
.orm-box{
    background:var(--day-bg);border-radius:8px;padding:10px;
    margin-top:8px;text-align:center;font-size:13px;
    border-left:3px solid var(--primary);
}

/* ===================================================
   VOLUME BADGE
=================================================== */
.vol-badge{
    background:var(--day-bg);border-radius:8px;padding:8px 14px;
    font-size:13px;color:var(--text-muted);text-align:center;margin-top:10px;
}

/* ===================================================
   THEME OPTION
=================================================== */
.theme-opt{
    display:flex;align-items:center;gap:14px;padding:14px;
    border-radius:12px;border:2px solid var(--border);cursor:pointer;margin-bottom:10px;transition:all .2s;
}
.theme-opt.active{border-color:var(--primary);box-shadow:var(--glow);}
.theme-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;}

/* ===================================================
   PPL BARS
=================================================== */
.ppl-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ppl-bar-bg{flex:1;background:var(--border);border-radius:10px;height:10px;overflow:hidden;}
.ppl-bar-fill{height:100%;border-radius:10px;transition:width .5s;}

/* ===================================================
   MODALS
=================================================== */
#pr-modal{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.75);z-index:500;align-items:center;justify-content:center;
}
#pr-modal.show{display:flex;}
.pr-content{
    background:var(--card);border-radius:20px;padding:30px 24px;text-align:center;
    border:2px solid var(--primary);box-shadow:var(--glow);max-width:280px;width:90%;
    animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}

#detail-modal{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:var(--bg);z-index:200;padding:20px;overflow-y:auto;box-sizing:border-box;
}
#detail-modal.show{display:block;}

#copy-modal{
    display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:var(--card);padding:20px;border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);width:80%;z-index:300;border:1px solid var(--border);
}

/* ===================================================
   COURSE CARDS
=================================================== */
.course-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.course-card{
    border-radius:16px;padding:18px 14px;text-align:center;
    border:2px solid transparent;cursor:pointer;
    transition:all .2s;position:relative;overflow:hidden;
}
.course-card.active{border-color:currentColor;}
.course-card:active{transform:scale(.97);}
.course-list-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;background:var(--day-bg);border-radius:12px;
    margin-bottom:8px;border-left:3px solid var(--course-col,var(--primary));
}

/* ===================================================
   QUICK LOG SHEET (하단 슬라이드업)
=================================================== */
#quick-log-overlay{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.5);z-index:300;
}
#quick-log-overlay.show{display:block;}
#quick-log-sheet{
    position:fixed;bottom:0;left:0;width:100%;z-index:301;
    background:var(--card);border-radius:24px 24px 0 0;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    border-top:2px solid var(--primary);box-shadow:var(--glow);
    transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1,.6,1);
    max-height:85vh;overflow-y:auto;
}
#quick-log-sheet.show{transform:translateY(0);}
.ql-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}

/* ===================================================
   TOAST NOTIFICATION
=================================================== */
#toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1e293b;color:#fff;padding:12px 24px;border-radius:30px;
    font-size:14px;font-weight:bold;z-index:999;
    opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
body[data-theme="hell"] #toast{background:#3d0a0a;border:1px solid var(--primary);}
body[data-theme="ocean"] #toast{background:#0d1829;border:1px solid var(--primary);}
body[data-theme="violet"] #toast{background:#150d24;border:1px solid var(--primary);}

/* ===================================================
   REST TIMER (세트 간 휴식)
=================================================== */
#rest-timer{
    position:fixed;bottom:calc(85px + env(safe-area-inset-bottom));left:50%;
    transform:translateX(-50%) translateY(40px);
    opacity:0;visibility:hidden;pointer-events:none;
    width:calc(100% - 30px);max-width:420px;
    background:var(--card);border:2px solid var(--primary);border-radius:16px;
    padding:12px 16px;z-index:400;
    box-shadow:var(--shadow),var(--glow);
    transition:transform .35s cubic-bezier(.32,1,.6,1),opacity .3s,visibility .3s;
}
#rest-timer.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;pointer-events:auto;}
#rest-timer-fill{height:100%;background:linear-gradient(90deg,var(--secondary),var(--primary));border-radius:6px;transition:width 1s linear;}

/* ===================================================
   TIMETABLE (운동 시간표)
=================================================== */
.tt-grid{display:grid;grid-template-columns:32px repeat(7,1fr);gap:2px;}
.tt-cell{min-height:22px;border-radius:4px;}
.tt-head{font-size:11px;font-weight:bold;text-align:center;color:var(--text-muted);min-height:18px;line-height:18px;}
.tt-hour{font-size:9px;color:var(--text-muted);text-align:right;padding-right:4px;line-height:22px;}
.tt-slot{background:var(--day-bg);border:1px solid var(--border);cursor:pointer;transition:background .15s;}
.tt-slot.on{background:var(--primary);border-color:var(--primary);box-shadow:var(--glow);}
.tt-slot.today-col:not(.on){background:var(--input-bg);border-color:var(--primary)44;}

/* ===================================================
   SPINNER (사진 분석 로딩)
=================================================== */
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}

/* ===================================================
   NATIVE APP FEEL (바운스/당겨서새로고침 방지 + 터치 폴리시)
=================================================== */
html,body{
    height:100%;overflow:hidden;
    overscroll-behavior:none;
    touch-action:manipulation; /* 더블탭 확대 지연 제거 */
}
#app-content{overscroll-behavior-y:contain;}
*{-webkit-tap-highlight-color:transparent;}
button,.nav-btn,.calendar-day,.course-list-item,.theme-opt,.tt-slot{
    -webkit-touch-callout:none;
    -webkit-user-select:none;user-select:none;
}
.nav-btn:active{transform:scale(.9);transition:transform .1s;}
button.primary:active,.btn-sm:active{transform:scale(.97);transition:transform .1s;}

/* ===================================================
   SPLASH SCREEN (앱 시작 화면)
=================================================== */
#splash{
    position:fixed;inset:0;z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:linear-gradient(180deg,var(--bg) 0%,var(--day-bg) 100%);
    transition:opacity .4s ease;
}
#splash.hide{opacity:0;pointer-events:none;}
#splash .splash-logo{
    font-size:76px;line-height:1;
    animation:splashPop .55s cubic-bezier(.34,1.56,.64,1);
    filter:drop-shadow(0 8px 24px rgba(37,99,235,.35));
}
#splash .splash-title{
    font-size:22px;font-weight:900;letter-spacing:4px;color:var(--text);
    animation:splashFade .7s ease;
}
#splash .splash-title span{color:var(--primary);}
#splash .splash-sub{font-size:11px;color:var(--text-muted);letter-spacing:2px;animation:splashFade .9s ease;}
#splash .splash-bar{width:120px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;}
#splash .splash-bar div{width:40%;height:100%;background:linear-gradient(90deg,var(--secondary),var(--primary));border-radius:2px;animation:splashSlide 1s ease-in-out infinite;}
@keyframes splashPop{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes splashFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes splashSlide{0%{margin-left:-40%;}100%{margin-left:100%;}}

/* ===================================================
   TAB TRANSITION (탭 전환 애니메이션)
=================================================== */
@keyframes tabIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.tab-anim{animation:tabIn .28s cubic-bezier(.25,.8,.4,1);}
    </style>
</head>

<body data-theme="light">
<script>
// 스플래시가 뜨기 전에 저장된 테마를 즉시 적용 (다크 테마 흰 화면 깜빡임 방지)
try{var _t=localStorage.getItem('app_theme');if(_t)document.body.setAttribute('data-theme',_t);}catch(e){}
</script>
<!-- Splash Screen (앱 시작 화면) -->
<div id="splash">
    <div class="splash-logo">💪</div>
    <div class="splash-title">FIT-TRACK <span>PRO</span></div>
    <div class="splash-sub">71-DAY CHALLENGE</div>
    <div class="splash-bar"><div></div></div>
</div>
<div id="app">
    <header>
        <div class="date-selector">
            <button onclick="setToday()">오늘</button>
            <input type="date" id="global-date" onchange="updateGlobalDate(this.value)">

    </header>
    <main id="app-content"></main>
    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="dash">🗓️ 홈</button>

        <button class="nav-btn" data-tab="course">📋 루틴</button>
        <button class="nav-btn" data-tab="history">📜 기록</button>
        <button class="nav-btn" data-tab="graph">📈 분석</button>
        <button class="nav-btn" data-tab="mgmt">⚙️ 설정</button>
    </nav>
</div>

<!-- Quick Log Sheet -->
<div id="quick-log-overlay" onclick="closeQuickLog()"></div>
<div id="quick-log-sheet">
    <div class="ql-handle"></div>
    <div id="quick-log-content"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Rest Timer (세트 간 휴식 타이머) -->
<div id="rest-timer">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:20px;">⏱️</span>
            <strong id="rest-timer-display" style="font-size:24px;color:var(--primary);font-variant-numeric:tabular-nums;">0:00</strong>
        </div>
        <div style="display:flex;gap:6px;">
            <button class="btn-sm" style="background:var(--day-bg);color:var(--text);border:1px solid var(--border);" onclick="addRestTime(30)">+30초</button>
            <button class="btn-sm btn-del" onclick="stopRestTimer()">종료</button>
        </div>
    </div>
    <div style="background:var(--border);border-radius:6px;height:6px;margin-top:10px;overflow:hidden;">
        <div id="rest-timer-fill" style="width:100%;"></div>
    </div>
</div>

<!-- PR Modal -->
<div id="pr-modal">
    <div class="pr-content">
        <div style="font-size:60px;margin-bottom:8px;">🏆</div>
        <h2 style="color:var(--primary);margin:0 0 10px;">신기록 달성!</h2>
        <p id="pr-text" style="margin:0 0 20px;color:var(--text);font-size:15px;"></p>
        <button class="primary" style="margin-top:0;" onclick="document.getElementById('pr-modal').classList.remove('show')">최고야! 💪</button>
    </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal"></div>

<div id="copy-modal">

<script>
/* ==================================================
   UTILITY
================================================== */
function getKSTDate(){
    const now=new Date();
    return new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().split('T')[0];
}
function getData(){return JSON.parse(localStorage.getItem('fit_data')||'{}');}
function saveData(d){localStorage.setItem('fit_data',JSON.stringify(d));}
function getLib(){return JSON.parse(localStorage.getItem('workout_lib')||'[]');}
function getHistory(){return JSON.parse(localStorage.getItem('workout_history')||'{}');}
function getPresets(){return JSON.parse(localStorage.getItem('food_presets')||'{}');}

// 부위 분류 (5부위 기반)
function classifyPPL(w){
    const PARTS=['어깨','가슴','등','하체','팔'];
    if(PARTS.includes(w.part))return w.part;
    return w.part||'기타';
}

// 1RM (Epley)
function calc1RM(weight,reps){
    if(!weight||!reps||reps<=0)return 0;
    if(reps===1)return weight;
    return Math.round(weight*(1+reps/30)*10)/10;
}

// 해당 종목의 역대 최고 중량
function getPR(name){
    let max=0;
    Object.values(getData()).forEach(day=>{
        (day.workout||[]).forEach(w=>{
            if(w.name===name&&w.type==='weight'){
                const wt=parseFloat(w.weight)||0;
                if(wt>max)max=wt;
            }
        });
    });
    return max;
}

// 최근 N회 기록
function getRecentRecords(name,n=3){
    const data=getData();
    const arr=[];
    Object.entries(data).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.name===name&&w.type==='weight')
                arr.push({date,weight:w.weight,sets:w.sets,reps:w.reps});
        });
    });
    return arr.slice(0,n);
}

// 연속 운동일 계산
function calcStreak(){
    const data=getData();
    let streak=0;
    let check=new Date(getKSTDate());
    while(true){
        // KST 기준 날짜 문자열 생성
        const ds=new Date(check.getTime()-check.getTimezoneOffset()*60000).toISOString().split('T')[0];
        if(data[ds]?.workout?.length>0){streak++;check.setDate(check.getDate()-1);}
        else break;
    }
    return streak;
}

// 총 볼륨 (세트×횟수×무게)
function calcVolume(workouts){
    return workouts.reduce((s,w)=>{
        if(w.type!=='weight')return s;
        const wt=Math.abs(parseFloat(w.weight)||0)||1;
        return s+wt*(parseInt(w.sets)||0)*(parseInt(w.reps)||0);
    },0);
}

// 하루 단백질 총합 (달력 표시용)
function getDayProteinTotal(day){
    if(!day||!day.protein||day.protein.length===0)return 0;
    return Math.round(day.protein.reduce((s,p)=>s+p.g,0)*10)/10;
}

// 토스트 알림
function showToast(msg,emoji='✅'){
    const t=document.getElementById('toast');
    if(!t)return;
    t.textContent=emoji+' '+msg;
    t.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// PR 모달
function showPR(name,weight){
    document.getElementById('pr-text').textContent=`${name}: ${weight}kg 신기록!`;
    document.getElementById('pr-modal').classList.add('show');
}

/* ==================================================
   THEME
================================================== */
function applyTheme(t){
    document.body.setAttribute('data-theme',t);
    localStorage.setItem('app_theme',t);
}
function loadTheme(){applyTheme(localStorage.getItem('app_theme')||'light');}

/* ==================================================
   ROUTER
================================================== */
window.currentDate=getKSTDate();
window.currentTab='dash';
window._renderToken=0;

document.addEventListener('DOMContentLoaded',()=>{
    loadTheme();
    const input=document.getElementById('global-date');
    if(input)input.value=window.currentDate;

    window.updateGlobalDate=(val)=>{window.currentDate=val;renderActiveTab();};
    window.setToday=()=>{
        const t=getKSTDate();
        document.getElementById('global-date').value=t;
        window.updateGlobalDate(t);
    };

    window.renderActiveTab=()=>{
        autoStopStaleSessions();
        const active=document.querySelector('.nav-btn.active');
        const tab=active?.dataset.tab||'dash';
        window.currentTab=tab;
        window._renderToken=(window._renderToken||0)+1;
        document.getElementById('app-content').innerHTML='';
        const map={
            dash:['성장 캘린더',renderDashboard],
            workout:['운동 기록',renderWorkout],
            course:['운동 루틴',renderRoutine],
            history:['전체 기록',renderHistory],
            graph:['변화 분석',renderGraphs],
            mgmt:['설정 및 관리',renderManagement],
        };
        const [title,fn]=map[tab]||map.dash;
        document.getElementById('view-title').innerText=title;
        fn();
        // 탭 전환 애니메이션 + 스크롤 최상단
        const c=document.getElementById('app-content');
        c.scrollTop=0;
        c.classList.remove('tab-anim');
        void c.offsetWidth; // 리플로우로 애니메이션 재시작
        c.classList.add('tab-anim');
    };

    document.querySelectorAll('.nav-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
            if(btn.classList.contains('active'))return;
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            renderActiveTab();
        });
    });
    renderActiveTab();
    // 스플래시 화면: 첫 렌더 후 부드럽게 사라짐
    setTimeout(()=>{
        const sp=document.getElementById('splash');
        if(sp){sp.classList.add('hide');setTimeout(()=>sp.remove(),450);}
    },450);
});

/* ==================================================
   DASHBOARD
================================================== */
function renderDashboard(){
    const content=document.getElementById('app-content');
    const sel=new Date(window.currentDate);
    const y=sel.getFullYear(),m=sel.getMonth();
    const streak=calcStreak();

    content.innerHTML=`
        <div id="diet-banner"></div>
        ${streak>0?`<div class="streak-banner">
            <div style="font-size:40px;">🔥</div>
            <div><div style="font-size:20px;font-weight:900;">${streak}일 연속 운동 중!</div>
            <div style="font-size:12px;opacity:.8;">오늘도 파이팅! 멈추지 마세요!</div></div>
        </div>`:''}
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <button onclick="changeMonth(-1)" style="border:none;background:var(--day-bg);padding:8px 14px;border-radius:10px;font-size:18px;color:var(--text);cursor:pointer;">◀</button>
                <strong style="font-size:18px;">${y}년 ${m+1}월</strong>
                <button onclick="changeMonth(1)" style="border:none;background:var(--day-bg);padding:8px 14px;border-radius:10px;font-size:18px;color:var(--text);cursor:pointer;">▶</button>
            </div>
            <div class="calendar" id="main-cal"></div>
        </div>
        <div id="today-routine-card"></div>
        <div id="protein-card"></div>
        <div id="meal-photo-card"></div>
        <div id="day-summary"></div>
        <div id="diet-rules"></div>`;

    renderCalendar(y,m);
    renderDietBanner();
    renderTodayRoutineCard(window.currentDate);
    renderProteinCard(window.currentDate);
    renderMealPhotoCard(window.currentDate);
    renderDaySummary(window.currentDate);
    renderDietRules();
}

function renderCalendar(y,m){
    const cal=document.getElementById('main-cal');
    const firstDay=new Date(y,m,1).getDay();
    const lastDate=new Date(y,m+1,0).getDate();
    const data=getData();
    const today=getKSTDate();
    let html='';
    for(let i=0;i<firstDay;i++)html+='<div></div>';
    for(let d=1;d<=lastDate;d++){
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const day=data[ds]||{};
        const sel=window.currentDate===ds;
        const isToday=today===ds;
        const proteinTotal=getDayProteinTotal(day);
        html+=`<div class="calendar-day${sel?' selected':''}${isToday?' today':''}"
            onclick="window.updateGlobalDate('${ds}');document.getElementById('global-date').value='${ds}';">
            <strong>${d}</strong>
            <div style="margin-top:auto;overflow:hidden;">
                ${day.weight?`<div style="color:var(--primary);font-size:8px;">${day.weight}k</div>`:''}
                ${day.workout?.length>0?`<div style="color:#6366f1;font-size:8px;">💪${day.workout.length}</div>`:''}
                ${proteinTotal>0?`<div style="color:${proteinTotal>=DIET_PLAN.proteinGoal?'var(--success)':'#f97316'};font-size:8px;">🥩${proteinTotal}g</div>`:''}
            </div>
        </div>`;
    }
    cal.innerHTML=html;
}

function renderDaySummary(ds){
    const c=document.getElementById('day-summary');
    if(!c)return;
    const data=getData();
    const day=data[ds]||{};
    const workouts=day.workout||[];
    const volume=calcVolume(workouts);

    c.innerHTML=`<div class="card">
        <h4 style="margin:0 0 15px;">📍 ${ds} 기록</h4>
        <div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:12px;">
            <div style="flex:1;"><label>공복 몸무게 (kg)</label>
            <input type="number" id="quick-weight" value="${day.weight||''}" step="0.01"></div>
            <button onclick="saveQuickWeight('${ds}')" class="btn-sm" style="background:var(--primary);color:#fff;height:45px;padding:0 16px;">저장</button>
        </div>
        ${volume>0?`<div class="vol-badge">⚡ 오늘 총 볼륨: <strong>${volume.toLocaleString()}kg</strong></div>`:''}

        <h5 style="margin:16px 0 10px;">🏋️ 운동 목록</h5>
        ${workouts.length>0?workouts.map(w=>{
            const prVal=w.type==='weight'?getPR(w.name):0;
            const isPR=w.type==='weight'&&prVal>0&&parseFloat(w.weight)>=prVal;
            return `<div style="padding:11px;background:var(--day-bg);border-radius:12px;margin-bottom:8px;cursor:pointer;"
                onclick="openDetail('${ds}','${w.id}')">
                <div style="font-weight:bold;color:var(--primary);">[${w.part}] ${w.name}${isPR?'<span class="pr-badge">🏆 PR</span>':''}</div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">
                    ${w.type==='weight'?`${w.weight}kg | ${w.sets}세트 | ${w.reps}회`:`${w.time||0}분${w.dist&&w.dist>0?' | '+w.dist+'km':''}`}
                </div>
            </div>`;
        }).join(''):'<p style="color:var(--text-muted);font-size:13px;">운동 기록 없음</p>'}

    </div>`;
}

function renderPPLAdvisor(){
    const sec=document.getElementById('ppl-advisor');
    if(!sec)return;
    const data=getData();
    const PARTS=['어깨','가슴','등','하체','팔'];
    const col={어깨:'#a855f7',가슴:'#ef4444',등:'#3b82f6',하체:'#22c55e',팔:'#f59e0b'};
    const emo={어깨:'🏔️',가슴:'💪',등:'🔙',하체:'🦵',팔:'🤜'};

    // 최근 7일 집계
    const counts={어깨:0,가슴:0,등:0,하체:0,팔:0};
    const lastDone={어깨:null,가슴:null,등:null,하체:null,팔:null};
    for(let i=6;i>=0;i--){
        const d=new Date(getKSTDate());d.setDate(d.getDate()-i);
        const ds=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().split('T')[0];
        (data[ds]?.workout||[]).forEach(w=>{
            const p=classifyPPL(w);
            if(counts[p]!==undefined){
                counts[p]++;
                if(lastDone[p]===null||i<lastDone[p])lastDone[p]=i;
            }
        });
    }

    // 회복 상태 (48시간)
    const REST_DAYS=2;
    const resting={};
    const available=[];
    PARTS.forEach(cat=>{
        const d=lastDone[cat];
        if(d===null||d>=REST_DAYS){resting[cat]=false;available.push(cat);}
        else resting[cat]=true;
    });

    // 추천 부위
    let rec=null,recReason='';
    const allResting=available.length===0;
    if(!allResting){
        available.sort((a,b)=>{
            const da=lastDone[a]===null?999:lastDone[a];
            const db=lastDone[b]===null?999:lastDone[b];
            return db-da;
        });
        rec=available[0];
        const days=lastDone[rec];
        recReason=days===null?'최근 7일간 안 했어요!':`마지막으로 한 지 ${days}일 지났어요 ✅`;
    }else{
        const sorted=Object.entries(lastDone).filter(e=>e[1]!==null).sort((a,b)=>b[1]-a[1]);
        rec=sorted[0]?.[0]||'가슴';
        recReason='모든 부위 회복 중 — 오늘은 완전 휴식 추천 😴';
    }

    sec.innerHTML=`<div class="card">
        <h4 style="margin:0 0 14px;">🎯 오늘의 추천 루틴</h4>
        ${allResting
            ?`<div style="background:#fef3c7;border-radius:12px;padding:14px;border-left:4px solid #f59e0b;margin-bottom:16px;">
                <div style="font-size:18px;font-weight:900;color:#92400e;">😴 오늘은 휴식 추천!</div>
                <div style="font-size:12px;color:#78350f;margin-top:4px;">모든 부위가 아직 48시간 회복 기간이에요.</div></div>`
            :`<div style="background:var(--day-bg);border-radius:12px;padding:14px;border-left:4px solid ${col[rec]};margin-bottom:16px;">
                <div style="font-size:20px;font-weight:900;color:${col[rec]};">${emo[rec]} ${rec} 추천!</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${recReason}</div></div>`}

        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">최근 7일 현황 · 탭하면 운동 목록 ↓</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;">
            ${PARTS.slice(0,3).map(cat=>`
            <button onclick="showPPLDetail('${cat}')"
                style="padding:10px 4px;border-radius:12px;border:2px solid ${resting[cat]?'#94a3b8':col[cat]};
                background:${resting[cat]?'var(--day-bg)':col[cat]+'22'};
                color:${resting[cat]?'var(--text-muted)':col[cat]};
                font-weight:900;font-size:12px;cursor:pointer;">
                ${emo[cat]} ${cat}<br>
                <span style="font-size:10px;font-weight:normal;">${counts[cat]}회</span><br>
                ${resting[cat]
                    ?`<span style="font-size:9px;color:#92400e;background:#fef3c7;border-radius:4px;padding:1px 3px;">💤 회복중</span>`
                    :`<span style="font-size:9px;color:#166534;background:#dcfce7;border-radius:4px;padding:1px 3px;">✅ 준비</span>`}
            </button>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;">
            ${PARTS.slice(3).map(cat=>`
            <button onclick="showPPLDetail('${cat}')"
                style="padding:10px 4px;border-radius:12px;border:2px solid ${resting[cat]?'#94a3b8':col[cat]};
                background:${resting[cat]?'var(--day-bg)':col[cat]+'22'};
                color:${resting[cat]?'var(--text-muted)':col[cat]};
                font-weight:900;font-size:12px;cursor:pointer;">
                ${emo[cat]} ${cat}<br>
                <span style="font-size:10px;font-weight:normal;">${counts[cat]}회</span><br>
                ${resting[cat]
                    ?`<span style="font-size:9px;color:#92400e;background:#fef3c7;border-radius:4px;padding:1px 3px;">💤 회복중</span>`
                    :`<span style="font-size:9px;color:#166534;background:#dcfce7;border-radius:4px;padding:1px 3px;">✅ 준비</span>`}
            </button>`).join('')}

window.showPPLDetail=function(cat){
    const box=document.getElementById('ppl-detail-box');
    if(!box)return;
    const colMap={어깨:'#a855f7',가슴:'#ef4444',등:'#3b82f6',하체:'#22c55e',팔:'#f59e0b'};
    const col=colMap[cat]||'var(--primary)';
    const data=getData();
    const hist=getHistory();
    const courseEx=(COURSE_DATA[cat]?.exercises)||[];

    // 내 기록에서 해당 부위 운동 추출 (최근 기록 우선)
    const mySeen={};
    Object.entries(data).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.type!=='weight')return;
            if(classifyPPL(w)===cat&&!mySeen[w.name]){
                mySeen[w.name]={name:w.name,weight:w.weight,sets:w.sets,reps:w.reps,date:date.slice(5)};
            }
        });
    });

    // 코스 순서대로 표시 (내 기록 있으면 무게 표시, 없으면 NEW)
    const courseItems=courseEx.map(ex=>{
        const my=mySeen[ex.name]||hist[ex.name];
        return {...ex,my};
    });

    // 코스에 없는 내 기록도 추가
    const courseNames=new Set(courseEx.map(e=>e.name));
    const extra=Object.values(mySeen).filter(m=>!courseNames.has(m.name));

    box.style.opacity='0';
    box.style.transform='translateY(-6px)';
    box.innerHTML=`
        <div style="border-top:2px dashed var(--border);margin-bottom:12px;"></div>
        <div style="font-size:12px;font-weight:bold;color:${col};margin-bottom:10px;">🗂️ ${cat} 코스 (추천 순서)</div>
        ${courseItems.map((ex,i)=>`
        <div style="display:flex;justify-content:space-between;align-items:center;
            padding:11px 12px;background:var(--day-bg);border-radius:10px;margin-bottom:6px;
            border-left:3px solid ${ex.my?col:'var(--border)'};">
            <div>
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px;">
                    <span style="background:${col}22;color:${col};border-radius:4px;padding:1px 6px;font-weight:bold;">${i+1}</span>
                </div>
                <div style="font-weight:bold;font-size:14px;">${ex.name}
                    ${!ex.my?'<span style="font-size:10px;color:var(--text-muted);background:var(--border);border-radius:4px;padding:1px 5px;margin-left:4px;">NEW</span>':''}
                </div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">💬 ${ex.tip}</div>
                ${ex.my?`<div style="font-size:11px;color:${col};margin-top:3px;">
                    최근 ${ex.my.date||''} · ${ex.my.weight}kg × ${ex.my.sets}세트 × ${ex.my.reps}회
                </div>`:''}
            </div>
            ${ex.my?`<div style="text-align:right;flex-shrink:0;margin-left:10px;">
                <div style="font-size:10px;color:var(--text-muted);">추정 1RM</div>
                <strong style="font-size:15px;color:${col};">${calc1RM(parseFloat(ex.my.weight),parseInt(ex.my.reps))}kg</strong>
            </div>`:''}
        </div>`).join('')}
        ${extra.length>0?`
        <div style="font-size:12px;color:var(--text-muted);margin:12px 0 8px;">📌 기타 기록된 ${cat} 운동</div>
        ${extra.map(ex=>`
        <div style="padding:10px 12px;background:var(--day-bg);border-radius:10px;margin-bottom:6px;
            border-left:3px dashed ${col};">
            <div style="font-weight:bold;font-size:13px;">${ex.name}</div>
            <div style="font-size:11px;color:${col};margin-top:2px;">
                최근 ${ex.date} · ${ex.weight}kg × ${ex.sets}세트 × ${ex.reps}회
            </div>
        </div>`).join('')}`:''}
    `;
    requestAnimationFrame(()=>{
        box.style.transition='all .3s ease';
        box.style.opacity='1';
        box.style.transform='translateY(0)';
    });
};

window.update1RM=function(){
    const w=parseFloat(document.getElementById('work-weight')?.value);
    const r=parseInt(document.getElementById('work-reps')?.value);

    if(!d)return;
    if(w&&r&&w>0&&r>0){
        const orm=calc1RM(w,r);
        d.style.display='block';
        d.innerHTML=`추정 1RM: <strong style="color:var(--primary);font-size:16px;">${orm}kg</strong> <span style="color:var(--text-muted);">(Epley 공식)</span>`;

window.toggleWorkoutType=function(t){
    document.getElementById('weight-fields').style.display=t==='weight'?'block':'none';
    document.getElementById('cardio-fields').style.display=t==='cardio'?'block':'none';
};

function saveWork(e){
    e.preventDefault();
    const ds=window.currentDate;
    const data=getData();
    if(!data[ds])data[ds]={};
    if(!data[ds].workout)data[ds].workout=[];

    const type=document.getElementById('work-type').value;
    const name=type==='weight'?document.getElementById('work-name').value:document.getElementById('cardio-name').value;
    const entry={id:'W'+Date.now(),type,name,memo:document.getElementById('work-memo').value};

    let isPR=false;
    if(type==='weight'){
        entry.part=document.getElementById('work-part').value;
        entry.weight=document.getElementById('work-weight').value;
        entry.sets=document.getElementById('work-sets').value;
        entry.reps=document.getElementById('work-reps').value;
        // PR 체크 (저장 전 기준)
        const prevMax=getPR(name);
        if(parseFloat(entry.weight)>prevMax&&prevMax>0)isPR=true;
        // history 저장 - 새 무게가 이전보다 크면 항상 업데이트
        const hist=getHistory();
        const prevHist=hist[name];
        const newWt=parseFloat(entry.weight)||0;
        const prevWt=parseFloat(prevHist?.weight)||0;
        if(!prevHist||newWt>prevWt){
            hist[name]={part:entry.part,weight:entry.weight,sets:entry.sets,reps:entry.reps};
            localStorage.setItem('workout_history',JSON.stringify(hist));
            if(prevHist&&newWt>prevWt)showToast(`증량! ${prevWt}→${newWt}kg 🎉`,'💪');
        }else{
            // 무게 같거나 낮아도 세트/횟수는 업데이트
            hist[name]={part:entry.part,weight:entry.weight,sets:entry.sets,reps:entry.reps};
            localStorage.setItem('workout_history',JSON.stringify(hist));
        }
    }else{
        entry.part='유산소';
        entry.time=document.getElementById('cardio-time').value;
        entry.dist=document.getElementById('cardio-dist').value;
    }
    // 수정 모드면 기존 항목 교체, 아니면 추가
    const form=document.getElementById('work-form');
    const editId=form?.dataset.editId;
    if(editId){
        const idx=data[ds].workout.findIndex(x=>x.id===editId);
        if(idx>=0){entry.id=editId;data[ds].workout[idx]=entry;}
        else data[ds].workout.push(entry);
        delete form.dataset.editId;
    }else{
        data[ds].workout.push(entry);
    }
    saveData(data);

    const lib=getLib();
    if(!lib.includes(name)){lib.push(name);localStorage.setItem('workout_lib',JSON.stringify(lib));}

    if(isPR)showPR(name,entry.weight);
    else showToast('저장되었습니다!');
    renderActiveTab();
}

window.editWorkoutItem=function(id){
    const data=getData();
    const w=(data[window.currentDate]?.workout||[]).find(x=>x.id===id);
    if(!w)return;
    // 폼에 값 채우기
    document.getElementById('work-type').value=w.type||'weight';
    toggleWorkoutType(w.type||'weight');
    if(w.type==='cardio'){
        document.getElementById('cardio-name').value=w.name||'';
        document.getElementById('cardio-time').value=w.time||'';
        document.getElementById('cardio-dist').value=w.dist||'';
    }else{
        document.getElementById('work-name').value=w.name||'';
        document.getElementById('work-part').value=w.part||'가슴';
        document.getElementById('work-weight').value=w.weight||'';
        document.getElementById('work-sets').value=w.sets||'';
        document.getElementById('work-reps').value=w.reps||'';
        update1RM();
    }
    document.getElementById('work-memo').value=w.memo||'';
    // 수정 모드 표시
    const form=document.getElementById('work-form');
    form.dataset.editId=id;
    form.querySelector('button[type=submit]').textContent='수정 완료';
    form.querySelector('h3').innerHTML='✏️ 운동 수정 중';
    form.scrollIntoView({behavior:'smooth'});
};

window.deleteWorkoutItem=function(id){
    if(!confirm('이 운동 기록을 삭제할까요?'))return;
    const data=getData();
    data[window.currentDate].workout=data[window.currentDate].workout.filter(w=>w.id!==id);
    saveData(data);renderActiveTab();
};

window.toggleCourse=function(cat){
    const detail=document.getElementById('course-detail');
    const colMap={어깨:'#a855f7',가슴:'#ef4444',등:'#3b82f6',하체:'#22c55e',팔:'#f59e0b'};
    const col=colMap[cat];
    const hist=getHistory();
    const data=getData();
    const courseEx=(COURSE_DATA[cat]?.exercises)||[];

    // 부위별 내 기록 추출
    const mySeen={};
    Object.entries(data).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.type!=='weight')return;
            if(classifyPPL(w)===cat&&!mySeen[w.name]){
                mySeen[w.name]={name:w.name,weight:w.weight,sets:w.sets,reps:w.reps,date:date.slice(5)};
            }
        });
    });

    const courseItems=courseEx.map(ex=>{
        const my=mySeen[ex.name]||hist[ex.name];
        return {...ex,my};
    });
    const courseNames=new Set(courseEx.map(e=>e.name));
    const extra=Object.values(mySeen).filter(m=>!courseNames.has(m.name));

    // 카드 활성화 표시
    document.querySelectorAll('.course-card').forEach(c=>c.classList.remove('active'));
    document.getElementById('ccard-'+cat)?.classList.add('active');

    detail.style.opacity='0';
    detail.innerHTML=`
        <div class="card">
            <h4 style="margin:0 0 14px;color:${col};">${COURSE_DATA[cat]?.emo||''} ${cat} 코스</h4>
            ${courseItems.map((ex,i)=>{
                const wt=ex.my?parseFloat(ex.my.weight):0;
                const rp=ex.my?parseInt(ex.my.reps):0;
                const orm=wt&&rp?calc1RM(wt,rp):0;
                const exData=encodeURIComponent(JSON.stringify({name:ex.name,part:cat,weight:ex.my?.weight||'',sets:ex.my?.sets||'',reps:ex.my?.reps||'',col}));
                return `<div class="course-list-item" style="--course-col:${col};cursor:pointer;active:opacity(.7);"
                    onclick="openQuickLog('${exData}')">
                    <div style="flex:1;">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span style="background:${col};color:#fff;border-radius:50%;width:22px;height:22px;
                                display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;">${i+1}</span>
                            <span style="font-weight:bold;font-size:15px;">${ex.name}</span>
                            ${!ex.my?'<span style="font-size:10px;color:var(--text-muted);background:var(--border);border-radius:4px;padding:1px 5px;">NEW</span>':''}
                        </div>
                        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;padding-left:30px;">💬 ${ex.tip}</div>
                        ${ex.my?`<div style="font-size:12px;color:${col};margin-top:4px;padding-left:30px;">
                            📅 ${ex.my.date||''} · <strong>${ex.my.weight}kg</strong> × ${ex.my.sets}세트 × ${ex.my.reps}회
                        </div>`:'<div style="font-size:11px;color:var(--text-muted);margin-top:4px;padding-left:30px;">아직 기록 없음</div>'}
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:10px;">
                        ${orm?`<div style="text-align:right;">
                            <div style="font-size:9px;color:var(--text-muted);">추정 1RM</div>
                            <div style="font-size:16px;font-weight:900;color:${col};">${orm}kg</div>
                        </div>`:''}
                        <div style="font-size:22px;color:${col};opacity:.7;">＋</div>
                    </div>
                </div>`;
            }).join('')}
            ${extra.length>0?`
            <div style="font-size:12px;color:var(--text-muted);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border);">📌 기타 기록된 ${cat} 운동</div>
            ${extra.map(ex=>`
            <div class="course-list-item" style="--course-col:${col};opacity:.8;cursor:pointer;"
                onclick="openQuickLog(encodeURIComponent(JSON.stringify({name:ex.name,part:cat,weight:ex.weight,sets:ex.sets,reps:ex.reps,col})))">
                <div style="flex:1;">
                    <div style="font-weight:bold;font-size:14px;">${ex.name}</div>
                    <div style="font-size:12px;color:${col};margin-top:3px;">
                        📅 ${ex.date} · <strong>${ex.weight}kg</strong> × ${ex.sets}세트 × ${ex.reps}회
                    </div>
                </div>
                <div style="font-size:22px;color:${col};opacity:.7;margin-left:10px;">＋</div>
            </div>`).join('')}`:''
            }
        </div>`;
    requestAnimationFrame(()=>{detail.style.transition='opacity .3s';detail.style.opacity='1';});
    detail.scrollIntoView({behavior:'smooth',block:'start'});
};

// ─── 빠른 기록 시트 ──────────────────────────────────────
window.openQuickLog=function(encodedData){
    const ex=JSON.parse(decodeURIComponent(encodedData));
    const col=ex.col||'var(--primary)';
    const hist=getHistory();
    const saved=hist[ex.name]||{};
    // history에서 최신 값 우선 사용 (루틴에서 열면 세트/횟수는 루틴 값 고정)
    const w=saved.weight||ex.weight||'';
    const s=ex.routineSets||saved.sets||ex.sets||'';
    const r=ex.routineReps||saved.reps||ex.reps||'';
    const prevS=saved.sets||ex.sets||s;
    const prevR=saved.reps||ex.reps||r;

    document.getElementById('quick-log-content').innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
            <div>
                <div style="font-size:11px;color:var(--text-muted);">${window.currentDate} 기록</div>
                <div style="font-size:20px;font-weight:900;color:${col};margin-top:2px;">${ex.name}</div>
                ${w?`<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">이전: ${w}kg × ${prevS}세트 × ${prevR}회</div>`:'<div style="font-size:12px;color:var(--text-muted);">첫 기록이에요! 12회 가능한 무게로 시작</div>'}
            </div>
            <button onclick="closeQuickLog()" style="background:var(--day-bg);border:none;border-radius:8px;padding:6px 12px;color:var(--text-muted);font-size:13px;cursor:pointer;">✕</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;">
            <div>
                <label style="font-size:12px;color:var(--text-muted);">중량 (kg)</label>
                <input type="number" id="ql-weight" value="${w}" placeholder="0"
                    style="border-color:${col};font-size:18px;font-weight:bold;text-align:center;margin-top:4px;"
                    oninput="qlUpdate1RM('${col}')">
            </div>
            <div>
                <label style="font-size:12px;color:var(--text-muted);">세트</label>
                <input type="number" id="ql-sets" value="${s}" placeholder="3"
                    style="font-size:18px;font-weight:bold;text-align:center;margin-top:4px;">
            </div>
            <div>
                <label style="font-size:12px;color:var(--text-muted);">횟수</label>
                <input type="number" id="ql-reps" value="${r}" placeholder="10"
                    style="font-size:18px;font-weight:bold;text-align:center;margin-top:4px;"
                    oninput="qlUpdate1RM('${col}')">
            </div>
        </div>
        <div id="ql-orm" style="text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:10px;min-height:20px;"></div>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;">
            <span style="font-size:11px;color:var(--text-muted);flex-shrink:0;">⏱️ 세트 휴식</span>
            <button type="button" class="btn-sm" style="flex:1;background:var(--day-bg);color:var(--text);border:1px solid var(--border);" onclick="startRestTimer(60)">1:00</button>
            <button type="button" class="btn-sm" style="flex:1;background:var(--day-bg);color:var(--text);border:1px solid var(--border);" onclick="startRestTimer(90)">1:30</button>
            <button type="button" class="btn-sm" style="flex:1;background:var(--day-bg);color:var(--text);border:1px solid var(--border);" onclick="startRestTimer(120)">2:00</button>
            <button type="button" class="btn-sm" style="flex:1;background:var(--day-bg);color:var(--text);border:1px solid var(--border);" onclick="startRestTimer(180)">3:00</button>
        </div>
        <label style="font-size:12px;color:var(--text-muted);">메모 (선택)</label>
        <textarea id="ql-memo" rows="2" placeholder="자세 포인트, 느낌 등..." style="margin-top:4px;font-size:14px;"></textarea>
        <button onclick="saveQuickLog('${ex.name}','${ex.part}','${col}')"
            style="width:100%;padding:16px;background:linear-gradient(135deg,${col}cc,${col});
            color:#fff;border:none;border-radius:12px;font-weight:bold;font-size:16px;
            margin-top:14px;cursor:pointer;letter-spacing:.5px;">
            ✅ 오늘 기록 저장
        </button>`;

    document.getElementById('quick-log-overlay').classList.add('show');
    setTimeout(()=>document.getElementById('quick-log-sheet').classList.add('show'),10);
    // 1RM 초기 계산
    qlUpdate1RM(col);
    // 중량 입력칸 포커스
    setTimeout(()=>document.getElementById('ql-weight')?.focus(),400);
};

window.closeQuickLog=function(){
    document.getElementById('quick-log-sheet').classList.remove('show');
    document.getElementById('quick-log-overlay').classList.remove('show');
};

window.qlUpdate1RM=function(col){
    const w=parseFloat(document.getElementById('ql-weight')?.value);
    const r=parseInt(document.getElementById('ql-reps')?.value);
    const box=document.getElementById('ql-orm');
    if(!box)return;
    if(w&&r&&w>0&&r>0){
        const orm=calc1RM(w,r);
        box.innerHTML=`추정 1RM: <strong style="color:${col};font-size:15px;">${orm}kg</strong>`;
    }else box.innerHTML='';
};

window.saveQuickLog=function(name,part,col){
    const weight=document.getElementById('ql-weight')?.value;
    const sets=document.getElementById('ql-sets')?.value;
    const reps=document.getElementById('ql-reps')?.value;
    const memo=document.getElementById('ql-memo')?.value||'';
    if(!weight||!sets||!reps){showToast('중량·세트·횟수를 입력해주세요','⚠️');return;}

    const ds=window.currentDate;
    const data=getData();
    if(!data[ds])data[ds]={};
    if(!data[ds].workout)data[ds].workout=[];

    // PR 체크
    const prevMax=getPR(name);
    const isPR=parseFloat(weight)>prevMax&&prevMax>0;

    const entry={id:'W'+Date.now(),type:'weight',name,part,weight,sets,reps,memo};
    data[ds].workout.push(entry);
    saveData(data);

    // workout_lib 업데이트
    const lib=getLib();
    if(!lib.includes(name)){lib.push(name);localStorage.setItem('workout_lib',JSON.stringify(lib));}

    // history 업데이트 (증량 시)
    const hist=getHistory();
    const prevWt=parseFloat(hist[name]?.weight)||0;
    const newWt=parseFloat(weight);
    hist[name]={part,weight,sets,reps};
    localStorage.setItem('workout_history',JSON.stringify(hist));

    closeQuickLog();

    if(isPR){showPR(name,weight);}
    else if(newWt>prevWt&&prevWt>0){showToast(`증량! ${prevWt}→${newWt}kg`,'💪');}
    else{showToast(`${name} 기록 완료!`);}

    // 홈/루틴 탭이면 체크 상태 갱신을 위해 재렌더
    const activeTab=document.querySelector('.nav-btn.active')?.dataset.tab;
    if(activeTab==='dash'||activeTab==='course')renderActiveTab();
};

function renderHistory(){
    const content=document.getElementById('app-content');
    content.innerHTML=`
        <div class="card" style="padding:12px;">
            <input type="text" id="history-search" placeholder="🔍 운동명 검색..." 
                style="margin:0;" oninput="searchHistory(this.value)">
        </div>
        <div class="filter-group">
            ${['전체','가슴','등','어깨','하체','팔','유산소'].map(p=>
                `<button class="filter-btn${p==='전체'?' active':''}" onclick="filterHistory('${p}',this)">${p}</button>`
            ).join('')}
        </div>
        <div id="history-list"></div>`;
    filterHistory('전체');
    window._historySearch='';
}

window.filterHistory=function(part,btn){
    if(btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
    const data=getData();
    let all=[];
    Object.entries(data).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>all.push({...w,date}));
    });
    all.sort((a,b)=>b.date.localeCompare(a.date));
    const q=(window._historySearch||'').trim().toLowerCase();
    let filtered=part==='전체'?all:all.filter(w=>w.part===part);
    if(q) filtered=filtered.filter(w=>(w.name||'').toLowerCase().includes(q));
    const listDiv=document.getElementById('history-list');
    if(filtered.length===0){listDiv.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:40px;">기록이 없습니다.</p>';return;}

    // 종목별 최고 중량 계산
    const maxByEx={};
    all.forEach(w=>{if(w.type==='weight'){const wt=parseFloat(w.weight)||0;if(!maxByEx[w.name]||wt>maxByEx[w.name])maxByEx[w.name]=wt;}});

    listDiv.innerHTML=filtered.map(w=>{
        const isPR=w.type==='weight'&&parseFloat(w.weight)>=(maxByEx[w.name]||0);
        return `<div class="card" style="padding:15px;">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:5px;">${w.date}</div>
            <strong>[${w.part}] ${w.name}</strong>${isPR?'<span class="pr-badge">🏆 PR</span>':''}
            <div style="font-size:13px;color:var(--text-muted);margin-top:5px;">
                ${w.type==='weight'?`${w.weight}kg | ${w.sets}세트 | ${w.reps}회`:`${w.time||0}분${w.dist&&w.dist>0?' | '+w.dist+'km':''}`}
            </div>
            ${w.memo?`<div style="font-size:12px;color:var(--text-muted);margin-top:8px;font-style:italic;">"${w.memo}"</div>`:''}
            <button class="btn-sm btn-edit" style="margin-top:10px;" onclick="goToEdit('${w.date}','${w.id}')">날짜로 이동</button>
        </div>`;
    }).join('');
};

window.searchHistory=function(q){
    window._historySearch=q;
    const activeBtn=document.querySelector('.filter-btn.active');
    const part=activeBtn?activeBtn.textContent:'전체';
    filterHistory(part);
};

window.goToEdit=function(date,id){
    window.currentDate=date;
    document.getElementById('global-date').value=date;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('[data-tab="workout"]').classList.add('active');
    renderActiveTab();showToast('해당 날짜로 이동!','📅');
};

const charts={};

function renderGraphs(){

    content.innerHTML=`
        <div class="tab-group">

            <button class="tab-option" onclick="switchGraphTab('exercise',this)">💪 운동 성장</button>
            <button class="tab-option" onclick="switchGraphTab('big3',this)">🏆 3대 운동</button>
        </div>
        <div id="graph-content"></div>`;

}

window.switchGraphTab=function(tab,btn){
    document.querySelectorAll('.tab-option').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(tab==='body')renderBodyGraphs(7);else if(tab==='big3')renderBig3();else renderExerciseGraphs();
};

function renderBodyGraphs(days){
    const gc=document.getElementById('graph-content');
    const renderToken=window._renderToken;
    gc.innerHTML=`
        <div style="display:flex;gap:8px;margin-bottom:15px;">
            <button onclick="renderBodyGraphs(7)" class="btn-sm" id="btn-7" style="flex:1;background:var(--primary);color:#fff;">최근 7일</button>
            <button onclick="renderBodyGraphs(30)" class="btn-sm" id="btn-30" style="flex:1;background:var(--day-bg);color:var(--text);">최근 30일</button>
        </div>
        <div class="card" style="height:300px;"><h4 style="margin:0 0 10px;">📉 체중 변화</h4><canvas id="wChart"></canvas></div>
`;

    setTimeout(()=>{
        if(window.currentTab!=='graph'||renderToken!==window._renderToken)return;
        const canvas=document.getElementById('wChart');
        if(!canvas)return;
        if(charts.w)charts.w.destroy();
        const data=getData();const labels=[],weights=[];
        for(let i=days-1;i>=0;i--){
            const d=new Date(getKSTDate());d.setDate(d.getDate()-i);
            const s=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().split('T')[0];
            labels.push(days===30&&i%5!==0?'':s.slice(5));
            const e=data[s]||{};
            weights.push(e.weight?parseFloat(e.weight):null);
        }
        const isDark=document.body.getAttribute('data-theme')!=='light';
        const gc2={color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)'};
        const tc=isDark?'#888':'#666';
        const opts={responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{x:{grid:gc2,ticks:{color:tc}},y:{grid:gc2,ticks:{color:tc}}}};
        charts.w=new Chart(canvas.getContext('2d'),{
            type:'line',
            data:{labels,datasets:[{data:weights,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',fill:true,tension:.3,spanGaps:true,pointRadius:days===30?0:4}]},
            options:opts
        });

    },100);
}

function renderBig3(){
    const renderToken=window._renderToken;
    const data=getData();
    // 3대 운동 별칭 처리
    const BIG3={
        '벤치 프레스':['벤치 프레스','벤치프레스'],
        '데드 리프트':['데드 리프트','데드리프트'],
        '스쿼트':['스쿼트'],
    };
    const col={'벤치 프레스':'#3b82f6','데드 리프트':'#ef4444','스쿼트':'#22c55e'};
    const emo={'벤치 프레스':'🫸','데드 리프트':'💀','스쿼트':'🦵'};

    // 각 운동별 날짜-최고중량 집계
    const history={}; // {운동명: [{date, weight}]}
    Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.type!=='weight'||!parseFloat(w.weight))return;
            const wt=parseFloat(w.weight);
            if(wt<=0)return;
            for(const [canonical,aliases] of Object.entries(BIG3)){
                if(aliases.includes(w.name)){
                    if(!history[canonical])history[canonical]=[];
                    // 같은 날짜면 최고값만 유지
                    const last=history[canonical][history[canonical].length-1];
                    if(last&&last.date===date){if(wt>last.weight)last.weight=wt;}
                    else history[canonical].push({date:date.slice(5),weight:wt,fullDate:date});
                    break;
                }
            }
        });
    });

    // 3대 합계 (각 최고 중량 기준)
    const prs={};
    for(const name of Object.keys(BIG3)){
        const arr=history[name]||[];
        prs[name]=arr.length>0?Math.max(...arr.map(r=>r.weight)):0;
    }
    const total=Object.values(prs).reduce((s,v)=>s+v,0);

    const gc=document.getElementById('graph-content');
    gc.innerHTML=`
        <div class="card">
            <h4 style="margin:0 0 14px;">🏆 3대 운동 합계</h4>
            <div style="text-align:center;padding:10px 0;">
                <div style="font-size:48px;font-weight:900;color:var(--primary);">${total}kg</div>
                <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">벤치 + 데드 + 스쿼트 최고 중량 합산</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px;">
                ${Object.entries(prs).map(([name,pr])=>`
                <div style="text-align:center;padding:12px 6px;background:var(--day-bg);border-radius:12px;border-top:3px solid ${col[name]};">
                    <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">${emo[name]} ${name.replace(' 프레스','').replace(' 리프트','')}</div>
                    <div style="font-size:22px;font-weight:900;color:${col[name]};">${pr>0?pr+'kg':'미기록'}</div>
                </div>`).join('')}
            </div>
        </div>

        ${Object.entries(BIG3).map(([name])=>{
            const arr=history[name]||[];
            const pr=prs[name];
            const first=arr[0];
            const last=arr[arr.length-1];
            const diff=first&&last?Math.round((last.weight-first.weight)*10)/10:0;
            return `
        <div class="card">
            <h4 style="margin:0 0 4px;color:${col[name]};">${emo[name]} ${name}</h4>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">총 ${arr.length}회 기록</div>
            ${arr.length===0?`<p style="color:var(--text-muted);text-align:center;padding:20px;">기록 없음</p>`:`
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;text-align:center;">
                <div style="background:var(--day-bg);border-radius:10px;padding:10px;">
                    <div style="font-size:18px;font-weight:900;">${first.weight}kg</div>
                    <div style="font-size:10px;color:var(--text-muted);">시작</div>
                </div>
                <div style="background:var(--day-bg);border-radius:10px;padding:10px;">
                    <div style="font-size:18px;font-weight:900;color:${diff>=0?'var(--success)':'var(--danger)'};">${diff>=0?'+':''}${diff}kg</div>
                    <div style="font-size:10px;color:var(--text-muted);">성장</div>
                </div>
                <div style="background:var(--day-bg);border-radius:10px;padding:10px;">
                    <div style="font-size:18px;font-weight:900;color:${col[name]};">${pr}kg</div>
                    <div style="font-size:10px;color:var(--text-muted);">최고 🏆</div>
                </div>
            </div>
            <div style="height:160px;"><canvas id="big3Chart_${name.replace(/ /g,'_')}"></canvas></div>
            <div style="margin-top:10px;font-size:11px;color:var(--text-muted);">최근 기록 ${arr.slice(-5).map(r=>`<span style="display:inline-block;background:var(--day-bg);border-radius:6px;padding:2px 8px;margin:2px;font-weight:bold;">${r.date} ${r.weight}kg</span>`).join('')}</div>
            `}
        </div>`;
        }).join('')}`;

    // 차트 렌더링
    setTimeout(()=>{
        if(window.currentTab!=='graph'||renderToken!==window._renderToken)return;
        const isDark=document.body.getAttribute('data-theme')!=='light';
        const gc2={color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)'};
        const tc=isDark?'#888':'#666';
        for(const name of Object.keys(BIG3)){

                type:'line',
                data:{

                        pointRadius:5,
                        pointBackgroundColor:arr.map(r=>r.weight===maxW?'#fff':col[name]),
                        pointBorderColor:arr.map(r=>r.weight===maxW?col[name]:'transparent'),
                        pointBorderWidth:2,

                        label:ctx=>`${ctx.raw}kg${ctx.raw===maxW?' 🏆':''}`

                    scales:{

                        y:{grid:gc2,ticks:{color:tc,callback:v=>v+'kg'}}

                }

        }

}

function renderExerciseGraphs(){

window.renderExerciseChart=function(name){
    if(window.currentTab!=='graph')return;
    const data=getData();
    const records=[];
    Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.name===name&&w.type==='weight'&&parseFloat(w.weight)>0)
                records.push({date:date.slice(5),weight:parseFloat(w.weight),full:date});
        });
    });
    document.getElementById('ex-chart-title').innerText=`${name} — 중량 변화`;
    if(charts.ex)charts.ex.destroy();
    const canvas=document.getElementById('exChart');
    if(!canvas)return;
    const first=records[0]?.weight||0;
    const last=records[records.length-1]?.weight||0;
    const maxW=Math.max(...records.map(r=>r.weight));
    const diff=Math.round((last-first)*10)/10;
    const isDark=document.body.getAttribute('data-theme')!=='light';
    const gc2={color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)'};
    const tc=isDark?'#888':'#666';
    charts.ex=new Chart(canvas.getContext('2d'),{
        type:'line',
        data:{
            labels:records.map(r=>r.date),
            datasets:[{
                data:records.map(r=>r.weight),
                borderColor:'#f59e0b',
                backgroundColor:'rgba(245,158,11,0.1)',
                fill:true,tension:.3,
                pointRadius:6,
                pointBackgroundColor:records.map(r=>r.weight===maxW?'#ef4444':'#f59e0b'),
                pointBorderColor:'#fff',pointBorderWidth:2,
            }]
        },
        options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false},tooltip:{callbacks:{
                label:ctx=>`${ctx.raw}kg${ctx.raw===maxW?' 🏆 최고기록':''}`

            scales:{

function getBackupData(){
    const keys=['fit_data','workout_lib','workout_history','food_presets','workout_schedule','gym_data','week_routine_map'];
    const b={};keys.forEach(k=>b[k]=JSON.parse(localStorage.getItem(k)||'{}'));
    return JSON.stringify(b,null,2);
}
function updateBackupTime(){
    const n=new Date();
    const t=`${n.getMonth()+1}/${n.getDate()} ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
    localStorage.setItem('last_backup_time',t);
}
window.exportData=function(){
    const blob=new Blob([getBackupData()],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`FitTrack_Backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    updateBackupTime();
};
window.copyData=function(){
    const el=document.createElement('textarea');el.value=getBackupData();
    document.body.appendChild(el);el.select();document.execCommand('copy');
    document.body.removeChild(el);
    updateBackupTime();
    document.getElementById('copy-modal').style.display='block';
};
window.importData=function(input){
    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(e)=>{
        try{
            const data=JSON.parse(e.target.result);
            if(confirm('기존 데이터를 덮어쓰고 불러오시겠습니까?')){
                Object.keys(data).forEach(k=>localStorage.setItem(k,JSON.stringify(data[k])));
                showToast('복구 완료!','📂');location.reload();
            }
        }catch{alert('잘못된 파일 형식입니다.');}
    };
    reader.readAsText(file);
};
window.clearData=function(){
    if(confirm('정말 모든 기록을 영구 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')){
        const theme=localStorage.getItem('app_theme');
        localStorage.clear();
        if(theme)localStorage.setItem('app_theme',theme);
        location.reload();
    }
};

/* ==================================================
   헬스장별 루틴 (gym_data)
   - gyms: 헬스장 목록 (고정 3곳)
   - selectedGym: 마지막 선택 헬스장
   - machines: {gymId:[{name,type,role,part,addedAt}]}
   - overrides: {gymId:{routineKey:{원래운동명:대체운동명}}}
================================================== */
function getGymData(){
    let g=null;
    try{g=JSON.parse(localStorage.getItem('gym_data')||'null');}catch(e){}
    if(!g||!Array.isArray(g.gyms)){
        g={
            gyms:[
                {id:'apt',name:'아파트 헬스장'},
                {id:'sound',name:'사운드짐'},
                {id:'personal',name:'개인 운동 헬스장'},
            ],
            selectedGym:null,
            machines:{},
            overrides:{},
        };
        localStorage.setItem('gym_data',JSON.stringify(g));
    }
    if(!g.machines)g.machines={};
    if(!g.overrides)g.overrides={};
    return g;
}
function saveGymData(g){localStorage.setItem('gym_data',JSON.stringify(g));}

// ROUTINE_TYPES 원본은 건드리지 않고, 해당 헬스장의 override를 적용한 사본을 반환
function getGymRoutine(routineKey,gymId){
    const base=ROUTINE_TYPES[routineKey];
    if(!base)return base;
    const copy=JSON.parse(JSON.stringify(base));
    if(gymId){
        const g=getGymData();
        const ov=g.overrides?.[gymId]?.[routineKey];
        if(ov){
            copy.exercises=copy.exercises.map(ex=>{
                if(ov[ex.name])return {...ex,name:ov[ex.name],_original:ex.name};
                return ex;
            });
        }
    }
    return copy;
}

function weekdayOf(ds){const p=ds.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]).getDay();}
function getRoutineKey(ds){return getWeekRoutineMap()[weekdayOf(ds)];}
function dietStatus(ds){
    const t=new Date(ds),d0=new Date(DIET_PLAN.start),d1=new Date(DIET_PLAN.end);
    const day=Math.floor((t-d0)/86400000)+1;
    const dday=Math.round((d1-t)/86400000);
    return{day,dday,active:day>=1&&dday>=0,before:day<1,after:dday<0};
}

/* ─── 오늘의 루틴 카드 (홈) ─────────────────────── */
function hoursToRanges(hours){
    if(!hours||hours.length===0)return'';
    const h=[...hours].sort((a,b)=>a-b);
    const ranges=[];let s=h[0],p=h[0];
    for(let i=1;i<=h.length;i++){
        if(h[i]===p+1){p=h[i];continue;}
        ranges.push(`${s}:00~${p+1}:00`);s=h[i];p=h[i];
    }
    return ranges.join(', ');
}

window.addProtein=function(ds,g,name){
    g=Math.round(parseFloat(g)*10)/10;
    if(!g||g<=0){showToast('그램 수를 입력해주세요','⚠️');return;}
    const data=getData();
    if(!data[ds])data[ds]={};
    if(!data[ds].protein)data[ds].protein=[];
    const n=new Date();
    const item={id:'P'+Date.now(),g,t:`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`};
    if(name)item.name=name;
    data[ds].protein.push(item);
    saveData(data);
    const total=Math.round(data[ds].protein.reduce((s,p)=>s+p.g,0)*10)/10;
    if(total>=DIET_PLAN.proteinGoal)showToast(`단백질 목표 달성! ${total}g 🎉`,'🥩');
    else showToast(`+${g}g (${total}/${DIET_PLAN.proteinGoal}g)`,'🥩');
    renderProteinCard(ds);
};

function resizeImageToBase64(file,maxSize){
    return new Promise((resolve,reject)=>{
        const img=new Image();
        const url=URL.createObjectURL(file);
        img.onload=()=>{
            const scale=Math.min(1,maxSize/Math.max(img.width,img.height));
            const c=document.createElement('canvas');
            c.width=Math.round(img.width*scale);
            c.height=Math.round(img.height*scale);
            c.getContext('2d').drawImage(img,0,0,c.width,c.height);
            URL.revokeObjectURL(url);
            resolve(c.toDataURL('image/jpeg',0.85).split(',')[1]);
        };
        img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('이미지 읽기 실패'));};
        img.src=url;
    });
}
/* 모델 폴백 체인: 한도 소진(429)이나 일시 오류 시 자동으로 다음 모델 시도 */
const GEMINI_MODELS=['gemini-2.5-flash','gemini-2.5-flash-lite','gemini-2.0-flash'];
async function callGeminiWithFallback(key,body){
    // 마지막에 성공했던 모델부터 시도 (한도 아낌)
    const pref=localStorage.getItem('gemini_model_pref');
    const models=pref&&GEMINI_MODELS.includes(pref)
        ?[pref,...GEMINI_MODELS.filter(m=>m!==pref)]
        :[...GEMINI_MODELS];
    let lastErr=null;
    for(const model of models){
        let res;
        try{
            res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+encodeURIComponent(key),{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body
            });
        }catch(e){
            throw new Error('네트워크 오류 — 인터넷 연결을 확인해주세요'); // 네트워크 문제는 모델 바꿔도 소용없음
        }
        if(res.ok){
            localStorage.setItem('gemini_model_pref',model);
            return {data:await res.json(),model,fellBack:model!==models[0]};
        }
        if(res.status===400||res.status===403){
            throw new Error('API 키를 확인해주세요 ('+res.status+')'); // 키 문제도 모델 바꿔도 소용없음
        }
        // 429(한도 소진)·404(모델 없음)·500·503(일시 오류) → 다음 모델로
        lastErr=new Error(model+' 실패 ('+res.status+(res.status===429?' 한도 소진':'')+')');
    }
    throw new Error('모든 모델 시도 실패 — '+(lastErr?lastErr.message:'')+' 잠시 후 다시 시도해주세요');
}

window.analyzeFoodPhoto=async function(input,ds){
    const file=input.files[0];
    input.value='';
    if(!file)return;
    const key=localStorage.getItem('gemini_api_key')||'';
    if(!key){showToast('설정 탭에서 Gemini API 키를 먼저 등록하세요','🔑');return;}
    // 분석용으로 찍은 밥 사진도 PT쌤 보관함에 함께 담아둔다 (분석이 실패해도 사진은 남도록 먼저 저장)

/* ==================================================
   🍽️ 밥 사진 보관함 — 하루 종일 모았다가 밤에 PT쌤한테 한 번에 전송

   사진은 용량이 커서(장당 수백KB) localStorage에 담으면 5MB 한도를 넘겨
   운동 기록까지 저장 실패할 수 있다. 그래서 사진 원본만 IndexedDB에 둔다.
   당일 임시 데이터라 백업(getBackupData) 대상이 아니며, 날짜가 지나면 자동 삭제된다.
================================================== */
const MEAL_DB='fittrack_meals', MEAL_STORE='photos';
let _mealDBPromise=null;
function mealDB(){
    if(_mealDBPromise)return _mealDBPromise;
    _mealDBPromise=new Promise((resolve,reject)=>{
        const req=indexedDB.open(MEAL_DB,1);
        req.onupgradeneeded=()=>{
            const db=req.result;
            if(!db.objectStoreNames.contains(MEAL_STORE)){
                db.createObjectStore(MEAL_STORE,{keyPath:'id'}).createIndex('date','date',{unique:false});
            }
        };
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>reject(req.error||new Error('사진 보관함을 열 수 없어요'));
    });
    return _mealDBPromise;
}
function _idb(r){return new Promise((res,rej)=>{r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function _mealStore(mode){return (await mealDB()).transaction(MEAL_STORE,mode).objectStore(MEAL_STORE);}

// base64 → Blob (기존 resizeImageToBase64를 그대로 쓰기 위한 변환기)
function base64ToBlob(b64,type){
    const bin=atob(b64);
    const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    return new Blob([arr],{type:type||'image/jpeg'});
}
async function addMealPhoto(ds,file){
    // PT쌤이 보실 사진이라 분석용(768px)보다 큰 1600px로 저장
    const b64=await resizeImageToBase64(file,1600);
    const st=await _mealStore('readwrite');
    await _idb(st.add({id:'M'+Date.now()+Math.random().toString(36).slice(2,6),date:ds,ts:Date.now(),sent:false,blob:base64ToBlob(b64)}));
}
async function getMealPhotos(ds){
    const st=await _mealStore('readonly');
    return (await _idb(st.index('date').getAll(ds))).sort((a,b)=>a.ts-b.ts);
}
async function deleteMealPhoto(id){const st=await _mealStore('readwrite');await _idb(st.delete(id));}
async function markMealPhotosSent(ds){
    const st=await _mealStore('readwrite');
    for(const r of await _idb(st.index('date').getAll(ds)))await _idb(st.put({...r,sent:true}));
}
// 지난 날짜 사진 정리 (오늘·미래 날짜는 남김)
async function purgeOldMealPhotos(){
    try{
        const today=getKSTDate();
        const st=await _mealStore('readwrite');
        for(const r of await _idb(st.getAll()))if(r.date<today)await _idb(st.delete(r.id));
    }catch(e){/* 보관함 정리 실패는 앱 동작에 영향 없음 */}
}

let _mealObjectURLs=[];
function _revokeMealURLs(){_mealObjectURLs.forEach(u=>URL.revokeObjectURL(u));_mealObjectURLs=[];}

        </div>`;
    }).join('');

    el.innerHTML=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <h4 style="margin:0;">🍽️ PT쌤한테 보낼 밥 사진</h4>

        <div style="display:flex;gap:8px;">
            <button class="btn-sm" style="flex:1;background:var(--day-bg);color:var(--primary);border:1px solid var(--primary);padding:12px;font-size:13px;"

            <button class="btn-sm" style="flex:1;background:var(--day-bg);color:var(--text);border:1px solid var(--border);padding:12px;font-size:13px;"
                onclick="document.getElementById('meal-photo-lib').click()">🖼️ 앨범</button>
        </div>
        <input type="file" id="meal-photo-cam" accept="image/*" capture="environment" style="display:none;" onchange="stashMealPhoto(this,'${ds}')">

               <div style="font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center;">공유 시트가 뜨면 카카오톡을 선택하세요 · 사진만 전송돼요</div>`

window.stashMealPhoto=async function(input,ds){

window.shareMealPhotos=async function(ds){
    const files=window._mealShareFiles||[];
    if(!files.length){showToast('보낼 사진이 없어요','⚠️');return;}
    try{
        await navigator.share({files}); // 사진만 보냄 — 제목/문구 붙이지 않음
    }catch(e){
        if(e&&e.name!=='AbortError')showToast('공유에 실패했어요','⚠️');

    }
    try{await markMealPhotosSent(ds);}catch(e){}

    renderMealPhotoCard(ds);
};

/* ─── 운동 세션 타이머 (90분 목표 트래킹 · 200분 되면 자동 종료) ────────── */
const SESSION_TARGET_MIN=90;
const SESSION_AUTO_STOP_MIN=200; // 종료 버튼 깜빡해도 200분 지나면 자동으로 멈춤
function fmtSessionMin(min){return min>=60?Math.floor(min/60)+'시간 '+(min%60)+'분':min+'분';}
function fmtElapsed(sec){return Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0');}
function sessionColor(elapsedMin){
    if(elapsedMin>=SESSION_TARGET_MIN)return 'var(--danger)';
    if(elapsedMin>=SESSION_TARGET_MIN*0.8)return '#f59e0b';
    return 'var(--primary)';
}
function renderSessionCard(){
    const el=document.getElementById('session-card');if(!el)return;
    clearInterval(window._sessInt);
    const ds=window.currentDate;
    const sess=(getData()[ds]||{}).session;
    if(!sess||!sess.start){
        el.innerHTML=`<div class="card" style="padding:14px;">
            <button class="primary" style="margin-top:0;" onclick="startSession()">▶️ 운동 시작 (90분 타이머)</button>
            <div style="font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center;">시작을 누르면 그날 루틴이 끝날 때까지 시간을 측정해요<br>⏱️ 종료를 깜빡해도 ${SESSION_AUTO_STOP_MIN}분이 지나면 자동으로 멈춰요</div>
        </div>`;
        return;
    }
    if(sess.end){
        const min=Math.round((sess.end-sess.start)/60000);
        const within=min<=SESSION_TARGET_MIN;
        el.innerHTML=`<div class="card" style="padding:14px;border-left:4px solid ${within?'var(--success)':'var(--danger)'};">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <div style="font-size:11px;color:var(--text-muted);">오늘 운동 시간</div>
                    <div style="font-size:20px;font-weight:900;color:${within?'var(--success)':'var(--danger)'};">🏁 ${fmtSessionMin(min)} ${within?'✅ 90분 내 성공!':'⚠️ 90분 초과'}</div>
                    ${sess.auto?`<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">⏹️ 종료 버튼을 못 눌러서 ${SESSION_AUTO_STOP_MIN}분에 자동 종료됐어요</div>`:''}
                </div>
                <button class="btn-sm btn-edit" onclick="resetSession()">다시 측정</button>
            </div>
        </div>`;
        return;
    }
    // 진행 중
    el.innerHTML=`<div class="card" style="padding:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
                <div style="font-size:11px;color:var(--text-muted);">⏱️ 운동 진행 중</div>
                <div id="sess-elapsed" style="font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;">0:00</div>
                <div id="sess-remain" style="font-size:12px;color:var(--text-muted);margin-top:2px;"></div>
            </div>
            <button class="btn-sm" style="background:var(--danger);color:#fff;padding:12px 16px;" onclick="endSession()">🏁 운동 종료</button>
        </div>
        <div style="background:var(--border);border-radius:8px;height:8px;margin-top:10px;overflow:hidden;">
            <div id="sess-bar" style="height:100%;width:0%;border-radius:8px;transition:width 1s linear;background:var(--primary);"></div>
        </div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:8px;text-align:center;">⏱️ ${SESSION_AUTO_STOP_MIN}분이 지나면 자동으로 종료돼요</div>
    </div>`;
    updateSessionUI(sess.start);
    window._sessInt=setInterval(()=>{
        if(!document.getElementById('sess-elapsed')){clearInterval(window._sessInt);return;}
        const elapsedMin=(Date.now()-sess.start)/60000;
        if(elapsedMin>=SESSION_AUTO_STOP_MIN){
            clearInterval(window._sessInt);
            autoStopStaleSessions();
            renderSessionCard();
            return;
        }
        updateSessionUI(sess.start);
    },1000);
}

// 앱을 다시 열었을 때(백그라운드/탭 전환 포함) 200분 넘은 세션이 있으면 자동 종료
function autoStopStaleSessions(){
    const data=getData();
    let changed=false;
    Object.keys(data).forEach(ds=>{
        const sess=data[ds]?.session;
        if(sess&&sess.start&&!sess.end){
            const min=(Date.now()-sess.start)/60000;
            if(min>=SESSION_AUTO_STOP_MIN){
                data[ds].session.end=sess.start+SESSION_AUTO_STOP_MIN*60000;
                data[ds].session.auto=true;
                changed=true;
            }
        }
    });
    if(changed){
        saveData(data);
        showToast(`⏱️ ${SESSION_AUTO_STOP_MIN}분 넘은 운동 타이머를 자동으로 종료했어요`,'⏹️');
    }
    return changed;
}
function updateSessionUI(startTs){
    const sec=Math.floor((Date.now()-startTs)/1000);
    const min=sec/60;
    const col=sessionColor(min);
    const e=document.getElementById('sess-elapsed');
    const r=document.getElementById('sess-remain');
    const b=document.getElementById('sess-bar');
    if(e){e.textContent=fmtElapsed(sec);e.style.color=col;}
    if(r){
        const remain=Math.ceil(SESSION_TARGET_MIN-min);
        r.innerHTML=remain>0
            ?`목표 90분까지 <strong style="color:${col};">${remain}분</strong> 남음`
            :`<strong style="color:var(--danger);">⚠️ 90분에서 ${Math.abs(remain)}분 초과! 마무리하자</strong>`;
    }
    if(b){b.style.width=Math.min(100,min/SESSION_TARGET_MIN*100)+'%';b.style.background=col;}
}
window.startSession=function(){
    const ds=window.currentDate;
    const data=getData();
    if(!data[ds])data[ds]={};
    data[ds].session={start:Date.now()};
    saveData(data);
    showToast('운동 시작! 90분 안에 끝내자 🔥','▶️');
    renderSessionCard();
};
window.endSession=function(){
    const ds=window.currentDate;
    const data=getData();
    if(!data[ds]?.session?.start)return;
    data[ds].session.end=Date.now();
    saveData(data);
    const min=Math.round((data[ds].session.end-data[ds].session.start)/60000);
    showToast(`운동 종료! 총 ${fmtSessionMin(min)}`,'🏁');
    renderSessionCard();
};
window.resetSession=function(){
    if(!confirm('운동 시간 기록을 지우고 다시 측정할까요?'))return;
    const ds=window.currentDate;
    const data=getData();
    if(data[ds])delete data[ds].session;
    saveData(data);
    renderSessionCard();
};

// "기록하기" 버튼 → 카메라 실행 (완료 처리는 사진을 찍은 뒤 handleCardioPhoto에서)
window.logFixedCardio=function(){
    const ds=window.currentDate;
    const data=getData();
    if((data[ds]?.workout||[]).some(w=>w.type==='cardio'&&(w.name||'').includes('계단'))){
        showToast('이미 오늘 유산소 완료!','🏃');
        return;
    }
    const cam=document.getElementById('cardio-photo-cam');
    if(cam)cam.click();
    else commitFixedCardioLog(); // 카메라 입력이 화면에 없는 예외 상황 대비
};

function commitFixedCardioLog(){
    const ds=window.currentDate;
    const data=getData();
    if(!data[ds])data[ds]={};
    if(!data[ds].workout)data[ds].workout=[];
    if(data[ds].workout.some(w=>w.type==='cardio'&&(w.name||'').includes('계단')))return false;
    data[ds].workout.push({id:'W'+Date.now(),type:'cardio',name:FIXED_CARDIO.name,part:'유산소',time:String(FIXED_CARDIO.time),dist:'',memo:'루틴 고정 유산소'});
    saveData(data);
    const lib=getLib();
    if(!lib.includes(FIXED_CARDIO.name)){lib.push(FIXED_CARDIO.name);localStorage.setItem('workout_lib',JSON.stringify(lib));}
    return true;
}

// 카메라로 찍은 인증사진 처리 → 완료 기록 + 공유 시트 표시
window.handleCardioPhoto=function(input){
    const file=input.files[0];
    input.value='';
    if(!file)return; // 사용자가 촬영을 취소한 경우 완료 처리 안 함
    const logged=commitFixedCardioLog();
    if(logged)showToast('천국의 계단 20분 완료!','🏃');
    renderTodayRoutine();
    showCardioPhotoSheet(file);
};

// 촬영한 인증사진 미리보기 + 카카오톡 공유 시트
function showCardioPhotoSheet(file){
    const url=URL.createObjectURL(file);
    window._cardioPhotoFile=file;
    const canShareFiles=!!(navigator.canShare&&navigator.canShare({files:[file]}));
    document.getElementById('quick-log-content').innerHTML=`
        <div style="text-align:center;">
            <div style="font-size:16px;font-weight:900;margin-bottom:12px;">🏃 천국의 계단 20분 완료!</div>
            <img src="${url}" style="max-width:100%;max-height:280px;border-radius:14px;margin-bottom:14px;object-fit:cover;">
            ${canShareFiles
                ?`<button class="primary" style="margin-top:0;" onclick="shareCardioPhoto()">📤 카카오톡으로 공유</button>
                   <div style="font-size:11px;color:var(--text-muted);margin-top:8px;">공유 시트가 뜨면 카카오톡을 선택해서 보내세요</div>`
                :`<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">이 브라우저/앱에서는 바로 공유가 안 돼요. 사진을 저장한 뒤 카카오톡에서 직접 보내주세요.</div>
                   <a href="${url}" download="cardio_${window.currentDate}.jpg" class="primary" style="display:block;text-decoration:none;box-sizing:border-box;">📥 사진 저장하기</a>`}
            <button class="btn-sm" style="width:100%;margin-top:10px;background:var(--day-bg);color:var(--text);border:1px solid var(--border);padding:12px;" onclick="closeQuickLog()">닫기</button>
        </div>`;
    document.getElementById('quick-log-overlay').classList.add('show');
    setTimeout(()=>document.getElementById('quick-log-sheet').classList.add('show'),10);
}
window.shareCardioPhoto=async function(){
    const file=window._cardioPhotoFile;
    if(!file){showToast('공유할 사진이 없어요','⚠️');return;}
    try{
        await navigator.share({files:[file]}); // 사진만 보냄 — 제목/문구 붙이지 않음
    }catch(e){
        if(e&&e.name!=='AbortError')showToast('공유에 실패했어요','⚠️');
    }
};

/* ─── 운동 시간표 (에타 스타일) ──────────────────── */
function renderTimetable(){

    const sched=getSchedule();
    const dayNames=['월','화','수','목','금','토','일'];
    const order=[1,2,3,4,5,6,0];
    const todayW=weekdayOf(getKSTDate());
    let hoursHtml='';
    for(let h=6;h<=23;h++){
        hoursHtml+=`<div class="tt-cell tt-hour">${h}</div>`;
        hoursHtml+=order.map(w=>{
            const on=(sched[String(w)]||[]).includes(h);
            return `<div class="tt-cell tt-slot${on?' on':''}${w===todayW?' today-col':''}" onclick="toggleScheduleCell(${w},${h})"></div>`;

        <div class="tt-grid">
            <div class="tt-cell tt-head"></div>
            ${order.map((w,i)=>`<div class="tt-cell tt-head" style="${w===todayW?'color:var(--primary);':''}">${dayNames[i]}</div>`).join('')}
            ${hoursHtml}
        </div>
    </div>`;
}
window.toggleScheduleCell=function(w,h){
    const sched=getSchedule();
    const key=String(w);
    if(!sched[key])sched[key]=[];
    const idx=sched[key].indexOf(h);
    if(idx>=0)sched[key].splice(idx,1);else sched[key].push(h);
    localStorage.setItem('workout_schedule',JSON.stringify(sched));
    renderTimetable();
};

/* ==================================================
   헬스장 머신 관리 (등록/삭제) + Gemini 인식·분류·추천
================================================== */
window.openMachineManager=function(){
    renderMachineManager(document.getElementById('app-content'));
};

function renderMachineManager(content){
    const g=getGymData();
    const gymId=g.selectedGym;
    const gym=g.gyms.find(x=>x.id===gymId);
    const machines=g.machines[gymId]||[];
    content.innerHTML=`
        <button class="btn-sm" style="background:var(--day-bg);color:var(--text);border:1px solid var(--border);margin-bottom:10px;" onclick="renderActiveTab()">← 루틴으로 돌아가기</button>
        <div class="card">
            <h3 style="margin:0 0 4px;">🏋️ ${gym?gym.name:''} 머신 관리</h3>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">머신을 등록하면 이 헬스장 루틴에 반영할 수 있어요. (다른 헬스장에는 영향 없음)</div>
            <div style="display:flex;gap:8px;margin-bottom:12px;">
                <button class="btn-sm" style="flex:1;background:var(--primary);color:#fff;padding:12px;" onclick="document.getElementById('machine-photo-cam').click()">📷 사진으로 등록</button>
                <button class="btn-sm" style="flex:1;background:var(--day-bg);color:var(--primary);border:1px solid var(--primary);padding:12px;" onclick="document.getElementById('machine-photo-lib').click()">🖼️ 앨범</button>
            </div>
            <input type="file" id="machine-photo-cam" accept="image/*" capture="environment" style="display:none;" onchange="handleMachinePhoto(this)">
            <input type="file" id="machine-photo-lib" accept="image/*" style="display:none;" onchange="handleMachinePhoto(this)">
            <div style="display:flex;gap:8px;">
                <input type="text" id="machine-name-input" placeholder="머신 이름 직접 입력" style="margin:0;">
                <button class="btn-sm" style="background:var(--secondary);color:#fff;flex-shrink:0;" onclick="handleMachineManualInput()">등록</button>
            </div>
        </div>
        <div id="machine-flow-box"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">📋 등록된 머신 (${machines.length})</h4>
            ${machines.length===0?'<p style="color:var(--text-muted);font-size:13px;">등록된 머신이 없습니다.</p>':machines.map((m,i)=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:11px;background:var(--day-bg);border-radius:10px;margin-bottom:8px;">
                <div>
                    <div style="font-weight:bold;">${m.name}</div>
                    <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${ROUTINE_TYPES[m.type]?.label||m.type||''} · ${m.role==='main'?'메인':'보조'} · ${m.part||''}</div>
                </div>
                <button class="btn-sm btn-del" onclick="deleteMachine(${i})">삭제</button>
            </div>`).join('')}
        </div>
        <div class="card">
            <h4 style="margin:0 0 10px;">🔁 적용된 대체 (override)</h4>
            ${renderOverridesList(gymId)}
        </div>`;
}

function renderOverridesList(gymId){
    const g=getGymData();
    const ov=g.overrides?.[gymId]||{};
    const entries=[];
    Object.entries(ov).forEach(([routineKey,map])=>{
        Object.entries(map||{}).forEach(([orig,repl])=>{
            entries.push({routineKey,orig,repl});
        });
    });
    if(entries.length===0)return '<p style="color:var(--text-muted);font-size:13px;">적용된 대체가 없습니다.</p>';
    return entries.map(e=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:11px;background:var(--day-bg);border-radius:10px;margin-bottom:8px;">
            <div style="font-size:13px;">
                <span style="color:var(--text-muted);">[${ROUTINE_TYPES[e.routineKey]?.label||e.routineKey}]</span>
                ${e.orig} → <strong style="color:var(--primary);">${e.repl}</strong>
            </div>
            <button class="btn-sm btn-edit" onclick="revertOverride('${e.routineKey}',decodeURIComponent('${encodeURIComponent(e.orig)}'))">원래대로</button>
        </div>`).join('');
}
window.revertOverride=function(routineKey,orig){
    const g=getGymData();
    const gymId=g.selectedGym;
    if(g.overrides?.[gymId]?.[routineKey]){
        delete g.overrides[gymId][routineKey][orig];
        saveGymData(g);
        showToast('원래 운동으로 복귀!','↩️');
    }
    renderMachineManager(document.getElementById('app-content'));
};
window.deleteMachine=function(i){
    if(!confirm('이 머신을 삭제할까요?'))return;
    const g=getGymData();
    const gymId=g.selectedGym;
    (g.machines[gymId]||[]).splice(i,1);
    saveGymData(g);
    renderMachineManager(document.getElementById('app-content'));
};

// ─── 1단계: 사진/직접입력 → 머신 이름 인식 ──────────
window.handleMachinePhoto=async function(input){
    const file=input.files[0];
    input.value='';
    if(!file)return;
    const key=localStorage.getItem('gemini_api_key')||'';
    if(!key){showToast('설정 탭에서 Gemini API 키를 먼저 등록하세요','🔑');return;}
    const box=document.getElementById('machine-flow-box');
    if(!box)return;
    box.innerHTML=`<div class="card" style="text-align:center;padding:30px 0;">
        <div class="spinner"></div>
        <div style="margin-top:16px;font-weight:bold;font-size:16px;">🔍 머신 인식 중...</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">보통 3~5초 걸려요</div>
    </div>`;
    box.scrollIntoView({behavior:'smooth'});
    try{
        const b64=await resizeImageToBase64(file,768);
        const prompt='사진 속 헬스장 운동 기구(머신)의 이름을 한국어로 알려줘. 반드시 아래 JSON 형식만 출력하고 다른 텍스트는 절대 쓰지 마.\n{"machine":"머신 이름(한국어)"}';
        const body=JSON.stringify({contents:[{parts:[
            {text:prompt},
            {inline_data:{mime_type:'image/jpeg',data:b64}}
        ]}]});
        const {data,model,fellBack}=await callGeminiWithFallback(key,body);
        if(fellBack)showToast('한도 초과로 '+model+'(으)로 전환했어요','🔄');
        const text=(data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
        const clean=text.replace(/```json|```/g,'').trim();
        const r=JSON.parse(clean);
        renderMachineConfirm(r.machine||'');
    }catch(e){
        box.innerHTML=`<div class="card"><p style="color:var(--danger);">인식 실패: ${((e.message||'네트워크 오류')+'').replace(/[<>]/g,'')}</p></div>`;
    }
};
window.handleMachineManualInput=function(){
    const name=(document.getElementById('machine-name-input')?.value||'').trim();
    if(!name){showToast('머신 이름을 입력해주세요','⚠️');return;}
    document.getElementById('machine-name-input').value='';
    renderMachineConfirm(name);
};

// ─── 2단계: 인식된 이름 확인/수정 ────────────────────
function renderMachineConfirm(name){
    const box=document.getElementById('machine-flow-box');if(!box)return;
    const safe=(name||'').replace(/"/g,'&quot;');
    box.innerHTML=`<div class="card">
        <h4 style="margin:0 0 10px;">🤔 이 머신이 맞나요?</h4>
        <input type="text" id="machine-confirm-name" value="${safe}">
        <button class="primary" style="margin-top:14px;" onclick="confirmMachineName()">✅ 맞아요 — 분류·추천 받기</button>
    </div>`;
    box.scrollIntoView({behavior:'smooth'});
}

// ─── 3+4단계: 분류(루틴/메인·보조/부위) + 대체 추천 ──
window.confirmMachineName=async function(){
    const name=(document.getElementById('machine-confirm-name')?.value||'').trim();
    if(!name){showToast('이름을 입력해주세요','⚠️');return;}
    const key=localStorage.getItem('gemini_api_key')||'';
    if(!key){showToast('설정 탭에서 Gemini API 키를 먼저 등록하세요','🔑');return;}
    const box=document.getElementById('machine-flow-box');if(!box)return;
    box.innerHTML=`<div class="card" style="text-align:center;padding:30px 0;">
        <div class="spinner"></div>
        <div style="margin-top:16px;font-weight:bold;font-size:16px;">🔍 분류 및 추천 받는 중...</div>
    </div>`;
    try{
        const gymId=getGymData().selectedGym;
        const currentRoutines={
            push:getGymRoutine('push',gymId).exercises.map(e=>({name:e.name,part:e.part,main:e.main})),
            pull:getGymRoutine('pull',gymId).exercises.map(e=>({name:e.name,part:e.part,main:e.main})),
            legs:getGymRoutine('legs',gymId).exercises.map(e=>({name:e.name,part:e.part,main:e.main})),
        };
        const prompt='헬스장 머신 "'+name+'"을(를) 분석해줘.\n'
            +'현재 이 헬스장의 push/pull/legs 루틴은 다음과 같아 (JSON): '+JSON.stringify(currentRoutines)+'\n'
            +'이 머신이 ①어느 루틴(push/pull/legs 중 하나)에 속하는지 ②메인(대근육) 운동인지 보조 운동인지 ③부위(가슴/등/어깨/팔/하체 중 하나) '
            +'④현재 루틴 중 이 머신으로 대체하면 좋은 운동이 있으면 그 운동 이름(없으면 null)과 이유를 알려줘.\n'
            +'반드시 아래 JSON 형식만 출력하고 다른 텍스트는 절대 쓰지 마.\n'
            +'{"machine":"'+name+'","routine":"push|pull|legs","role":"main|sub","part":"가슴|등|어깨|팔|하체","replace":"대체할 운동 이름 또는 null","reason":"이유 한 줄(한국어)"}';
        const body=JSON.stringify({contents:[{parts:[{text:prompt}]}]});
        const {data,model,fellBack}=await callGeminiWithFallback(key,body);
        if(fellBack)showToast('한도 초과로 '+model+'(으)로 전환했어요','🔄');
        const text=(data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
        const clean=text.replace(/```json|```/g,'').trim();
        const r=JSON.parse(clean);
        if(!r.machine)r.machine=name;
        renderMachineRecommend(r);
    }catch(e){
        box.innerHTML=`<div class="card"><p style="color:var(--danger);">분류 실패: ${((e.message||'네트워크 오류')+'').replace(/[<>]/g,'')}</p></div>`;
    }
};

// ─── 5단계: 추천 표시 + 승인/거절 ────────────────────
function renderMachineRecommend(r){
    const box=document.getElementById('machine-flow-box');if(!box)return;
    window._pendingMachine=r;
    const routineLabel=ROUTINE_TYPES[r.routine]?.label||r.routine||'';
    const hasReplace=r.replace&&r.replace!=='null'&&r.replace!==null;
    box.innerHTML=`<div class="card">
        <h4 style="margin:0 0 10px;">🧠 분류 결과</h4>
        <div style="font-size:14px;line-height:1.8;">
            <div><strong>${r.machine}</strong></div>
            <div>루틴: <strong>${routineLabel}</strong> · ${r.role==='main'?'메인':'보조'} · 부위: ${r.part||''}</div>
        </div>
        ${hasReplace?`<div style="background:var(--day-bg);border-radius:10px;padding:12px;margin-top:12px;">
            <div style="font-size:13px;">💡 <strong>${routineLabel}</strong> 루틴의 '<strong>${r.replace}</strong>' 자리를 이 머신으로 대체할까요?</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">${r.reason||''}</div>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="primary" style="margin-top:0;flex:1;" onclick="approveMachineReplace()">✅ 대체 승인</button>
            <button class="btn-sm" style="flex:1;background:var(--day-bg);color:var(--text);border:1px solid var(--border);" onclick="rejectMachineReplace()">머신만 등록</button>
        </div>`
        :`<div style="margin-top:12px;">
            <button class="primary" style="margin-top:0;" onclick="rejectMachineReplace()">✅ 머신 등록하기 (루틴 변경 없음)</button>
        </div>`}
    </div>`;
    box.scrollIntoView({behavior:'smooth'});
}
function addMachineToGym(g,gymId,r){
    if(!g.machines[gymId])g.machines[gymId]=[];
    g.machines[gymId].push({name:r.machine,type:r.routine,role:r.role,part:r.part,addedAt:getKSTDate()});
}
window.approveMachineReplace=function(){
    const r=window._pendingMachine;if(!r)return;
    const g=getGymData();
    const gymId=g.selectedGym;
    if(!g.overrides[gymId])g.overrides[gymId]={};
    if(!g.overrides[gymId][r.routine])g.overrides[gymId][r.routine]={};
    g.overrides[gymId][r.routine][r.replace]=r.machine;
    addMachineToGym(g,gymId,r);
    saveGymData(g);
    showToast(`${r.replace} → ${r.machine} 대체 완료!`,'✅');
    window._pendingMachine=null;
    renderMachineManager(document.getElementById('app-content'));
};
window.rejectMachineReplace=function(){
    const r=window._pendingMachine;if(!r)return;
    const g=getGymData();
    const gymId=g.selectedGym;
    addMachineToGym(g,gymId,r);
    saveGymData(g);
    showToast('머신 등록 완료 (루틴 변경 없음)','✅');
    window._pendingMachine=null;
    renderMachineManager(document.getElementById('app-content'));
};

/* ─── 세트 간 휴식 타이머 ────────────────────────── */
let _restEndAt=0,_restTotal=0,_restInterval=null,_audioCtx=null;
function fmtRestTime(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function restRemaining(){return Math.max(0,Math.ceil((_restEndAt-Date.now())/1000));}
function updateRestUI(){
    const left=restRemaining();
    const d=document.getElementById('rest-timer-display');
    const f=document.getElementById('rest-timer-fill');
    if(d)d.textContent=fmtRestTime(left);
    if(f)f.style.width=(_restTotal?Math.max(0,left/_restTotal*100):0)+'%';
}
// iOS는 사용자 제스처(버튼 탭) 시점에 오디오 컨텍스트를 만들어야 소리가 남
function initAudio(){
    try{
        if(!_audioCtx)_audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        if(_audioCtx.state==='suspended')_audioCtx.resume();
    }catch(e){}
}
window.startRestTimer=function(sec){
    // 시스템 타이머 연동이 켜져 있으면 iOS 기본 타이머만 실행
    // (인앱 타이머는 아예 띄우지 않음 — 이중 타이머 방지)
    if(localStorage.getItem('use_sys_timer')==='1'){
        const sname=localStorage.getItem('sys_timer_shortcut_name')||'휴식타이머';
        location.href='shortcuts://run-shortcut?name='+encodeURIComponent(sname)+'&input=text&text='+sec;
        return;
    }
    initAudio();
    // 첫 사용 시 알림 권한 요청 (버튼 탭 = 제스처라 요청 가능)
    if('Notification'in window&&Notification.permission==='default'){
        Notification.requestPermission().catch(()=>{});
    }
    _restEndAt=Date.now()+sec*1000;_restTotal=sec;
    document.getElementById('rest-timer').classList.add('show');
    updateRestUI();
    clearInterval(_restInterval);
    _restInterval=setInterval(()=>{
        if(restRemaining()<=0){finishRestTimer();return;}
        updateRestUI();
    },250);
};
window.addRestTime=function(s){if(_restInterval){_restEndAt+=s*1000;_restTotal+=s;updateRestUI();}};
window.stopRestTimer=function(){
    clearInterval(_restInterval);_restInterval=null;
    document.getElementById('rest-timer').classList.remove('show');
};
function finishRestTimer(){
    stopRestTimer(); // 시간 끝나면 자동으로 내려가서 사라짐
    showToast('휴식 끝! 다음 세트 가자 💪','🔔');
    if(navigator.vibrate)navigator.vibrate([200,100,200]);
    playChime();
    notifyRestDone();
}
// 짧은 "띠링" 2음 차임 (~0.5초)
function playChime(){
    try{
        if(!_audioCtx)_audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        const ctx=_audioCtx;
        [[880,0],[1318.5,0.15]].forEach(([freq,t])=>{
            const o=ctx.createOscillator(),g=ctx.createGain();
            o.type='sine';o.connect(g);g.connect(ctx.destination);
            o.frequency.value=freq;
            g.gain.setValueAtTime(0.25,ctx.currentTime+t);
            g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.35);
            o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.4);
        });
    }catch(e){}
}
// iOS 알림 (홈 화면 설치 + 권한 허용 시)
function notifyRestDone(){
    if(!('Notification'in window)||Notification.permission!=='granted')return;
    const opts={body:'다음 세트 시작할 시간이에요 🏋️',tag:'rest-timer'};
    if(navigator.serviceWorker&&navigator.serviceWorker.ready){
        navigator.serviceWorker.ready
            .then(reg=>reg.showNotification('⏱️ 휴식 끝!',opts))
            .catch(()=>{try{new Notification('⏱️ 휴식 끝!',opts);}catch(e){}});
    }else{
        try{new Notification('⏱️ 휴식 끝!',opts);}catch(e){}
    }
}
// 화면 잠금/백그라운드에서 돌아왔을 때 남은 시간 즉시 보정
document.addEventListener('visibilitychange',()=>{
    if(!document.hidden){
        if(_restInterval){
            if(restRemaining()<=0)finishRestTimer();
            else updateRestUI();
        }
        // 백그라운드에 있는 동안 200분이 지났으면 돌아왔을 때 바로 자동 종료 처리
        if(autoStopStaleSessions()&&window.currentTab==='course')renderTodayRoutine();
    }
});
// 설정 탭: 알림 권한 요청
window.requestNotifyPermission=function(){
    if(!('Notification'in window)){showToast('이 브라우저는 알림 미지원','⚠️');return;}
    Notification.requestPermission().then(p=>{
        showToast(p==='granted'?'알림 허용 완료!':'알림이 허용되지 않았어요','🔔');
        renderManagement();
    }).catch(()=>{});
};
// 설정 탭: Gemini API 키 저장/삭제
window.saveGeminiKey=function(){
    const k=(document.getElementById('gemini-key-input')?.value||'').trim();
    if(!k){showToast('키를 입력해주세요','⚠️');return;}
    localStorage.setItem('gemini_api_key',k);
    showToast('API 키 저장 완료!','🤖');
    renderManagement();
};
window.clearGeminiKey=function(){
    if(!confirm('저장된 API 키를 삭제할까요?'))return;
    localStorage.removeItem('gemini_api_key');
    showToast('키 삭제됨','🗑️');
    renderManagement();
};
// 설정 탭: 시스템 타이머 연동
window.toggleSysTimer=function(){
    const on=localStorage.getItem('use_sys_timer')==='1';
    localStorage.setItem('use_sys_timer',on?'0':'1');
    showToast(on?'시스템 타이머 연동 끔':'시스템 타이머 연동 켬! 단축어를 먼저 만들어주세요','⏰');
    renderManagement();
};
window.saveSysTimerName=function(){
    const n=(document.getElementById('sys-timer-name')?.value||'').trim();
    if(!n){showToast('단축어 이름을 입력해주세요','⚠️');return;}
    localStorage.setItem('sys_timer_shortcut_name',n);
    showToast('단축어 이름 저장: '+n,'⏰');
};

// 날짜가 지난 밥 사진 정리 (저장공간 관리)
purgeOldMealPhotos();

/* ==================================================
   SERVICE WORKER
================================================== */
if('serviceWorker'in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

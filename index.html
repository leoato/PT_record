<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fit-Track Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitTrack">
    <link rel="apple-touch-icon" href="icon.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
/* ===================================================
   THEME VARIABLES
=================================================== */
:root {
    --primary:#2563eb; --secondary:#3b82f6; --success:#059669; --danger:#dc2626;
    --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --text-muted:#64748b;
    --border:#e2e8f0; --shadow:0 4px 20px rgba(0,0,0,0.08); --glow:none;
    --nav-bg:#ffffff; --nav-inactive:#94a3b8; --input-bg:#f1f5f9; --day-bg:#f1f5f9;
}
body[data-theme="hell"] {
    --primary:#ff0000; --secondary:#ff4800; --success:#ff8000; --danger:#991b1b;
    --bg:#000; --card:#0a0000; --text:#fff1f1; --text-muted:#9a6060;
    --border:#3d0a0a; --shadow:0 10px 40px -10px rgba(255,0,0,0.4);
    --glow:0 0 15px rgba(255,0,0,0.6),0 0 30px rgba(255,72,0,0.4);
    --nav-bg:#000; --nav-inactive:#5a2d2d; --input-bg:#140404; --day-bg:#110303;
}
body[data-theme="ocean"] {
    --primary:#00d4ff; --secondary:#0ea5e9; --success:#34d399; --danger:#f87171;
    --bg:#070d1a; --card:#0d1829; --text:#e0f2fe; --text-muted:#60a5b4;
    --border:#1e3a5f; --shadow:0 10px 40px -10px rgba(0,212,255,0.15);
    --glow:0 0 20px rgba(0,212,255,0.25); --nav-bg:#070d1a; --nav-inactive:#2a5a6e;
    --input-bg:#0d1829; --day-bg:#0d1829;
}

/* ===================================================
   BASE
=================================================== */
*{box-sizing:border-box;}
body{
    font-family:-apple-system,system-ui,sans-serif;
    margin:0;background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;transition:background .3s,color .3s;
}
body[data-theme="hell"]{background-image:radial-gradient(circle at center bottom,#3a0a0a 0%,#000 80%);background-attachment:fixed;}
body[data-theme="ocean"]{background-image:radial-gradient(circle at 30% 70%,#0a1f3d 0%,#070d1a 70%);background-attachment:fixed;}

#app{display:flex;flex-direction:column;height:100vh;}

header{
    background:var(--card);
    backdrop-filter:blur(10px);
    padding:calc(12px + env(safe-area-inset-top)) 12px 12px;
    border-bottom:2px solid var(--primary);
    box-shadow:var(--glow);
    position:sticky;top:0;z-index:100;
}
body[data-theme="hell"] header,body[data-theme="ocean"] header{background:rgba(0,0,0,0.92);}

h1{margin:0;font-size:18px;text-align:center;color:var(--text);}
h3,h4,h5{color:var(--text);}

.date-selector{display:flex;justify-content:center;gap:10px;margin-bottom:5px;}
.date-selector button{
    padding:6px 16px;border-radius:20px;
    border:2px solid var(--primary);background:var(--card);
    color:var(--primary);font-weight:900;cursor:pointer;
}
.date-selector input{
    border:1px solid var(--border);font-weight:bold;
    background:var(--card);color:var(--text);
    padding:5px 10px;border-radius:8px;font-size:15px;
}

#app-content{flex:1;overflow-y:auto;padding:15px 15px 100px;-webkit-overflow-scrolling:touch;}

/* ===================================================
   CARD
=================================================== */
.card{
    background:var(--card);border-radius:16px;padding:16px;
    margin-bottom:15px;border:1px solid var(--border);
    box-shadow:var(--shadow);position:relative;overflow:hidden;
}
body[data-theme="hell"] .card::before,
body[data-theme="ocean"] .card::before{
    content:'';position:absolute;top:0;left:0;width:100%;height:2px;
    background:linear-gradient(90deg,transparent,var(--primary),transparent);
}

/* ===================================================
   NAVIGATION
=================================================== */
.bottom-nav{
    position:fixed;bottom:0;width:100%;height:75px;
    background:var(--nav-bg);display:flex;
    border-top:2px solid var(--primary);
    padding-bottom:env(safe-area-inset-bottom);
    z-index:100;box-shadow:var(--glow);
}
.nav-btn{
    flex:1;border:none;background:none;font-size:10px;
    color:var(--nav-inactive);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;
}
.nav-btn.active{color:var(--primary);font-weight:bold;}
body[data-theme="hell"] .nav-btn.active,
body[data-theme="ocean"] .nav-btn.active{text-shadow:0 0 10px var(--primary);}

/* ===================================================
   FORM ELEMENTS
=================================================== */
label{font-size:13px;color:var(--text-muted);margin-top:12px;display:block;}
input,select,textarea{
    width:100%;padding:12px;
    border:2px solid var(--border);border-radius:10px;
    font-size:16px;margin-top:5px;
    background:var(--input-bg);color:var(--text);
}
input:focus,select:focus,textarea:focus{border-color:var(--primary);outline:none;box-shadow:var(--glow);}
select option{background:var(--input-bg);color:var(--text);}

button.primary{
    width:100%;padding:16px;
    background:linear-gradient(135deg,var(--secondary),var(--primary));
    color:#fff;border:none;border-radius:12px;font-weight:bold;
    margin-top:15px;cursor:pointer;
    text-transform:uppercase;letter-spacing:1px;box-shadow:var(--glow);
}
.btn-sm{padding:8px 12px;border-radius:8px;border:none;font-size:12px;font-weight:bold;cursor:pointer;}
.btn-edit{background:var(--day-bg);color:var(--secondary);border:1px solid var(--secondary);}
.btn-del{background:var(--day-bg);color:var(--danger);border:1px solid var(--danger);}

/* ===================================================
   CALENDAR
=================================================== */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:15px;}
.calendar-day{
    min-height:62px;border:1px solid var(--border);border-radius:10px;
    padding:5px;font-size:11px;background:var(--day-bg);
    display:flex;flex-direction:column;cursor:pointer;
    transition:border-color .2s;
}
.calendar-day strong{color:var(--primary);}
.calendar-day.selected{border:2px solid var(--primary);box-shadow:var(--glow);}
.calendar-day.today strong{color:var(--success);}

/* ===================================================
   FILTER BUTTONS
=================================================== */
.filter-group{display:flex;gap:8px;overflow-x:auto;padding:5px 0 15px;-webkit-overflow-scrolling:touch;}
.filter-btn{
    padding:8px 16px;border-radius:10px;border:1px solid var(--border);
    background:var(--card);color:var(--text);white-space:nowrap;
    font-size:13px;font-weight:bold;cursor:pointer;
}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--glow);}

/* ===================================================
   GRAPH TABS
=================================================== */
.tab-group{display:flex;gap:6px;background:var(--day-bg);border-radius:12px;padding:6px;margin-bottom:15px;}
.tab-option{flex:1;padding:8px;border-radius:8px;border:none;background:none;font-size:13px;color:var(--text-muted);cursor:pointer;font-weight:bold;}
.tab-option.active{background:var(--primary);color:#fff;}

/* ===================================================
   PR BADGE
=================================================== */
.pr-badge{
    display:inline-block;background:gold;color:#7a5000;
    border-radius:4px;padding:1px 6px;font-size:10px;font-weight:bold;margin-left:5px;
}

/* ===================================================
   STREAK BANNER
=================================================== */
.streak-banner{
    background:linear-gradient(135deg,var(--secondary),var(--primary));
    border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;
    margin-bottom:14px;color:#fff;box-shadow:var(--glow);
}

/* ===================================================
   PROTEIN RING
=================================================== */
.ring-wrap{display:flex;align-items:center;justify-content:center;gap:24px;padding:8px 0;}
.ring-svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
.ring-prog{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dasharray .6s ease;}

/* ===================================================
   RECENT HISTORY BOX
=================================================== */
.hist-box{background:var(--day-bg);border-radius:10px;padding:10px;margin-top:6px;font-size:12px;}

/* ===================================================
   1RM DISPLAY
=================================================== */
.orm-box{
    background:var(--day-bg);border-radius:8px;padding:10px;
    margin-top:8px;text-align:center;font-size:13px;
    border-left:3px solid var(--primary);
}

/* ===================================================
   VOLUME BADGE
=================================================== */
.vol-badge{
    background:var(--day-bg);border-radius:8px;padding:8px 14px;
    font-size:13px;color:var(--text-muted);text-align:center;margin-top:10px;
}

/* ===================================================
   THEME OPTION
=================================================== */
.theme-opt{
    display:flex;align-items:center;gap:14px;padding:14px;
    border-radius:12px;border:2px solid var(--border);cursor:pointer;margin-bottom:10px;transition:all .2s;
}
.theme-opt.active{border-color:var(--primary);box-shadow:var(--glow);}
.theme-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;}

/* ===================================================
   PPL BARS
=================================================== */
.ppl-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ppl-bar-bg{flex:1;background:var(--border);border-radius:10px;height:10px;overflow:hidden;}
.ppl-bar-fill{height:100%;border-radius:10px;transition:width .5s;}

/* ===================================================
   MODALS
=================================================== */
#pr-modal{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.75);z-index:500;align-items:center;justify-content:center;
}
#pr-modal.show{display:flex;}
.pr-content{
    background:var(--card);border-radius:20px;padding:30px 24px;text-align:center;
    border:2px solid var(--primary);box-shadow:var(--glow);max-width:280px;width:90%;
    animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}

#detail-modal{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:var(--bg);z-index:200;padding:20px;overflow-y:auto;box-sizing:border-box;
}
#detail-modal.show{display:block;}

#copy-modal{
    display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:var(--card);padding:20px;border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);width:80%;z-index:300;border:1px solid var(--border);
}

/* ===================================================
   TOAST NOTIFICATION
=================================================== */
#toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1e293b;color:#fff;padding:12px 24px;border-radius:30px;
    font-size:14px;font-weight:bold;z-index:999;
    opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
body[data-theme="hell"] #toast{background:#3d0a0a;border:1px solid var(--primary);}
body[data-theme="ocean"] #toast{background:#0d1829;border:1px solid var(--primary);}
    </style>
</head>

<body data-theme="light">
<div id="app">
    <header>
        <div class="date-selector">
            <button onclick="setToday()">오늘</button>
            <input type="date" id="global-date" onchange="updateGlobalDate(this.value)">
        </div>
        <h1 id="view-title">성장 캘린더</h1>
    </header>
    <main id="app-content"></main>
    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="dash">🗓️ 홈</button>
        <button class="nav-btn" data-tab="workout">🏋️ 운동</button>
        <button class="nav-btn" data-tab="food">🍱 식단</button>
        <button class="nav-btn" data-tab="history">📜 기록</button>
        <button class="nav-btn" data-tab="graph">📈 분석</button>
        <button class="nav-btn" data-tab="mgmt">⚙️ 설정</button>
    </nav>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- PR Modal -->
<div id="pr-modal">
    <div class="pr-content">
        <div style="font-size:60px;margin-bottom:8px;">🏆</div>
        <h2 style="color:var(--primary);margin:0 0 10px;">신기록 달성!</h2>
        <p id="pr-text" style="margin:0 0 20px;color:var(--text);font-size:15px;"></p>
        <button class="primary" style="margin-top:0;" onclick="document.getElementById('pr-modal').classList.remove('show')">최고야! 💪</button>
    </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal"></div>

<!-- Copy Modal -->
<div id="copy-modal">
    <p style="font-weight:bold;color:var(--text);">클립보드에 복사되었습니다!</p>
    <p style="font-size:12px;color:var(--text-muted);">Koder에서 새 파일을 만들어 붙여넣고 .json으로 저장하세요.</p>
    <button class="primary" onclick="document.getElementById('copy-modal').style.display='none'">확인</button>
</div>

<script>
/* ==================================================
   UTILITY
================================================== */
function getKSTDate(){
    const now=new Date();
    return new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().split('T')[0];
}
function getData(){return JSON.parse(localStorage.getItem('fit_data')||'{}');}
function saveData(d){localStorage.setItem('fit_data',JSON.stringify(d));}
function getLib(){return JSON.parse(localStorage.getItem('workout_lib')||'[]');}
function getHistory(){return JSON.parse(localStorage.getItem('workout_history')||'{}');}
function getPresets(){return JSON.parse(localStorage.getItem('food_presets')||'{}');}

// PPL 분류
function classifyPPL(w){
    // 1순위: 운동 데이터에 직접 저장된 PPL
    if(w.ppl && w.ppl!=='자동')return w.ppl;
    // 2순위: workout_history에 저장된 PPL (한번 설정하면 기억)
    const hist=getHistory();
    if(hist[w.name] && hist[w.name].ppl && hist[w.name].ppl!=='자동')return hist[w.name].ppl;
    // 3순위: 부위 기반 자동 추정 (폴백)
    const push=['가슴','어깨'];
    const pull=['등'];
    const pullKw=['풀업','로우','컬','풀다운','풀 다운','싯티드','매달리기','데드','인버티드'];
    if(w.part==='하체')return '하체';
    if(push.includes(w.part))return '밀기';
    if(pull.includes(w.part))return '당기기';
    if(w.part==='팔'){
        if(pullKw.some(k=>(w.name||'').includes(k)))return '당기기';
        return '밀기';
    }
    if(w.part==='유산소')return '유산소';
    return '기타';
}

// 1RM (Epley)
function calc1RM(weight,reps){
    if(!weight||!reps||reps<=0)return 0;
    if(reps===1)return weight;
    return Math.round(weight*(1+reps/30)*10)/10;
}

// 해당 종목의 역대 최고 중량
function getPR(name){
    let max=0;
    Object.values(getData()).forEach(day=>{
        (day.workout||[]).forEach(w=>{
            if(w.name===name&&w.type==='weight'){
                const wt=parseFloat(w.weight)||0;
                if(wt>max)max=wt;
            }
        });
    });
    return max;
}

// 최근 N회 기록
function getRecentRecords(name,n=3){
    const data=getData();
    const arr=[];
    Object.entries(data).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.name===name&&w.type==='weight')
                arr.push({date,weight:w.weight,sets:w.sets,reps:w.reps});
        });
    });
    return arr.slice(0,n);
}

// 연속 운동일 계산
function calcStreak(){
    const data=getData();
    let streak=0;
    let check=new Date(getKSTDate());
    while(true){
        // KST 기준 날짜 문자열 생성
        const ds=new Date(check.getTime()-check.getTimezoneOffset()*60000).toISOString().split('T')[0];
        if(data[ds]?.workout?.length>0){streak++;check.setDate(check.getDate()-1);}
        else break;
    }
    return streak;
}

// 총 볼륨 (세트×횟수×무게)
function calcVolume(workouts){
    return workouts.reduce((s,w)=>{
        if(w.type!=='weight')return s;
        const wt=Math.abs(parseFloat(w.weight)||0)||1;
        return s+wt*(parseInt(w.sets)||0)*(parseInt(w.reps)||0);
    },0);
}

// 토스트 알림
function showToast(msg,emoji='✅'){
    const t=document.getElementById('toast');
    if(!t)return;
    t.textContent=emoji+' '+msg;
    t.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// PR 모달
function showPR(name,weight){
    document.getElementById('pr-text').textContent=`${name}: ${weight}kg 신기록!`;
    document.getElementById('pr-modal').classList.add('show');
}

/* ==================================================
   THEME
================================================== */
function applyTheme(t){
    document.body.setAttribute('data-theme',t);
    localStorage.setItem('app_theme',t);
}
function loadTheme(){applyTheme(localStorage.getItem('app_theme')||'light');}

/* ==================================================
   ROUTER
================================================== */
window.currentDate=getKSTDate();

document.addEventListener('DOMContentLoaded',()=>{
    loadTheme();
    const input=document.getElementById('global-date');
    if(input)input.value=window.currentDate;

    window.updateGlobalDate=(val)=>{window.currentDate=val;renderActiveTab();};
    window.setToday=()=>{
        const t=getKSTDate();
        document.getElementById('global-date').value=t;
        window.updateGlobalDate(t);
    };

    window.renderActiveTab=()=>{
        const active=document.querySelector('.nav-btn.active');
        const tab=active?.dataset.tab||'dash';
        document.getElementById('app-content').innerHTML='';
        const map={
            dash:['성장 캘린더',renderDashboard],
            workout:['운동 기록',renderWorkout],
            food:['식단 트래커',renderNutrition],
            history:['전체 기록',renderHistory],
            graph:['변화 분석',renderGraphs],
            mgmt:['설정 및 관리',renderManagement],
        };
        const [title,fn]=map[tab]||map.dash;
        document.getElementById('view-title').innerText=title;
        fn();
    };

    document.querySelectorAll('.nav-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            renderActiveTab();
        });
    });
    renderActiveTab();
});

/* ==================================================
   DASHBOARD
================================================== */
function renderDashboard(){
    const content=document.getElementById('app-content');
    const sel=new Date(window.currentDate);
    const y=sel.getFullYear(),m=sel.getMonth();
    const streak=calcStreak();

    content.innerHTML=`
        ${streak>0?`<div class="streak-banner">
            <div style="font-size:40px;">🔥</div>
            <div><div style="font-size:20px;font-weight:900;">${streak}일 연속 운동 중!</div>
            <div style="font-size:12px;opacity:.8;">오늘도 파이팅! 멈추지 마세요!</div></div>
        </div>`:''}
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <button onclick="changeMonth(-1)" style="border:none;background:var(--day-bg);padding:8px 14px;border-radius:10px;font-size:18px;color:var(--text);cursor:pointer;">◀</button>
                <strong style="font-size:18px;">${y}년 ${m+1}월</strong>
                <button onclick="changeMonth(1)" style="border:none;background:var(--day-bg);padding:8px 14px;border-radius:10px;font-size:18px;color:var(--text);cursor:pointer;">▶</button>
            </div>
            <div class="calendar" id="main-cal"></div>
        </div>
        <div id="day-summary"></div>
        <div id="ppl-advisor"></div>`;

    renderCalendar(y,m);
    renderDaySummary(window.currentDate);
    renderPPLAdvisor();
}

function renderCalendar(y,m){
    const cal=document.getElementById('main-cal');
    const firstDay=new Date(y,m,1).getDay();
    const lastDate=new Date(y,m+1,0).getDate();
    const data=getData();
    const today=getKSTDate();
    let html='';
    for(let i=0;i<firstDay;i++)html+='<div></div>';
    for(let d=1;d<=lastDate;d++){
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const day=data[ds]||{};
        const sel=window.currentDate===ds;
        const isToday=today===ds;
        const prot=(day.food||[]).reduce((s,f)=>s+Number(f.prot||0),0);
        html+=`<div class="calendar-day${sel?' selected':''}${isToday?' today':''}"
            onclick="window.updateGlobalDate('${ds}');document.getElementById('global-date').value='${ds}';">
            <strong>${d}</strong>
            <div style="margin-top:auto;">
                ${day.weight?`<div style="color:var(--primary);font-size:8px;">${day.weight}k</div>`:''}
                ${day.workout?.length>0?`<div style="color:#6366f1;font-size:8px;">💪${day.workout.length}</div>`:''}

function renderPPLAdvisor(){
    const sec=document.getElementById('ppl-advisor');
    if(!sec)return;
    const data=getData();
    const col={밀기:'#ef4444',당기기:'#3b82f6',하체:'#22c55e'};
    const emo={밀기:'💪',당기기:'🤜',하체:'🦵'};
    const desc={
        밀기:'가슴·어깨·삼두 — 벤치프레스, OHP, 체스트프레스, 사레레 등',
        당기기:'등·이두 — 풀업, 렛풀다운, 바벨컬, 시티드로우 등',
        하체:'대퇴·햄스트링 — 레그프레스, 데드리프트, 레그컬 등',
    };

    // 최근 7일 횟수 집계
    const counts={밀기:0,당기기:0,하체:0};
    // 각 부위를 마지막으로 한 날짜 (0=오늘, 1=어제, 2=이틀전...)
    const lastDone={밀기:null,당기기:null,하체:null};

    for(let i=6;i>=0;i--){
        const d=new Date(getKSTDate());d.setDate(d.getDate()-i);
        const ds=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().split('T')[0];
        const ws=data[ds]?.workout||[];
        ws.forEach(w=>{
            const p=classifyPPL(w);
            if(counts[p]!==undefined){
                counts[p]++;
                // i=0이 오늘, i=1이 어제 → 경과일 = i
                // 마지막으로 한 날 = 경과일이 가장 작은 날
                if(lastDone[p]===null||i<lastDone[p])lastDone[p]=i;
            }
        });
    }

    // 휴식 필요 여부 (경과일 0=오늘, 1=어제 → 2일 미만이면 휴식 필요)
    // i가 작을수록 최근 → lastDone[p]=0이면 오늘 함, 1이면 어제 함
    const REST_DAYS=2;
    const resting={};
    const availableForToday=[];
    ['밀기','당기기','하체'].forEach(cat=>{
        const daysAgo=lastDone[cat]; // null이면 최근 7일간 안함
        if(daysAgo===null||daysAgo>=REST_DAYS){
            resting[cat]=false;
            availableForToday.push(cat);
        }else{
            resting[cat]=true; // 아직 쉬는 중
        }
    });

    // 추천 결정: 가용 부위 중 가장 오래된 것 (lastDone 크거나 null)
    let rec=null;
    let recReason='';
    if(availableForToday.length>0){
        // null(한 번도 안함)을 최우선, 그 다음 lastDone 큰 것(더 오래 쉰 것)
        availableForToday.sort((a,b)=>{
            const da=lastDone[a]===null?999:lastDone[a];
            const db=lastDone[b]===null?999:lastDone[b];
            return db-da;
        });
        rec=availableForToday[0];
        const days=lastDone[rec];
        recReason=days===null?'최근 7일간 안 했어요 — 그냥 쉬어도 OK, 하면 더 좋아요!'
            :`마지막으로 한 지 ${days}일 지났어요 ✅ 회복 완료!`;
    }else{
        // 전부 쉬는 중이면 가장 오래 쉰 것 추천 (쉬어도 됨 경고와 함께)
        const sorted=Object.entries(lastDone).sort((a,b)=>b[1]-a[1]);
        rec=sorted[0][0];
        recReason=`모든 부위가 아직 회복 중이에요. 오늘은 완전 휴식을 추천해요 😴`;
    }

    // 부위별 상태 태그
    const statusTag=(cat)=>{
        if(resting[cat])return `<span style="font-size:10px;background:#fef3c7;color:#92400e;border-radius:4px;padding:2px 6px;margin-left:4px;">💤 회복 중 (${REST_DAYS-lastDone[cat]}일 남음)</span>`;
        if(lastDone[cat]===null)return `<span style="font-size:10px;background:var(--day-bg);color:var(--text-muted);border-radius:4px;padding:2px 6px;margin-left:4px;">미실시</span>`;
        return `<span style="font-size:10px;background:#dcfce7;color:#166534;border-radius:4px;padding:2px 6px;margin-left:4px;">✅ 준비됨</span>`;
    };

    const allResting=availableForToday.length===0;

    sec.innerHTML=`<div class="card">
        <h4 style="margin:0 0 14px;">🎯 오늘의 PPL 루틴 추천</h4>
        ${allResting
            ?`<div style="background:#fef3c7;border-radius:12px;padding:14px;border-left:4px solid #f59e0b;margin-bottom:16px;">
                <div style="font-size:20px;font-weight:900;color:#92400e;">😴 오늘은 휴식 추천!</div>
                <div style="font-size:12px;color:#78350f;margin-top:5px;">모든 부위가 아직 48시간 회복 기간이에요.<br>무리하면 부상 위험이 있어요.</div>
              </div>`
            :`<div style="background:var(--day-bg);border-radius:12px;padding:14px;border-left:4px solid ${col[rec]};margin-bottom:16px;">
                <div style="font-size:22px;font-weight:900;color:${col[rec]};">${emo[rec]} ${rec} 데이 추천!</div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:5px;">${desc[rec]}</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">${recReason}</div>
              </div>`}

        <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">최근 7일 부위별 현황</div>
        ${Object.entries(counts).map(([cat,cnt])=>`
        <div class="ppl-bar-wrap" style="margin-bottom:10px;">
            <div style="width:42px;font-size:12px;font-weight:bold;color:${col[cat]};">${cat}</div>
            <div class="ppl-bar-bg"><div class="ppl-bar-fill" style="width:${Math.max(...Object.values(counts))>0?Math.round(cnt/Math.max(...Object.values(counts))*100):0}%;background:${resting[cat]?'#94a3b8':col[cat]};"></div></div>
            <div style="font-size:12px;color:var(--text-muted);min-width:20px;">${cnt}</div>
            ${statusTag(cat)}
        </div>`).join('')}
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px;padding:8px;background:var(--day-bg);border-radius:8px;">
            💡 근육은 운동 후 <strong>48시간(2일)</strong> 동안 회복이 필요해요. 같은 부위를 이틀 연속 하면 성장이 아닌 손상이 됩니다.
        </div>
    </div>`;
}

function saveWork(e){
    e.preventDefault();
    const ds=window.currentDate;
    const data=getData();
    if(!data[ds])data[ds]={};
    if(!data[ds].workout)data[ds].workout=[];

    const type=document.getElementById('work-type').value;
    const name=type==='weight'?document.getElementById('work-name').value:document.getElementById('cardio-name').value;
    const entry={id:'W'+Date.now(),type,name,memo:document.getElementById('work-memo').value};

    let isPR=false;
    if(type==='weight'){
        entry.part=document.getElementById('work-part').value;
        entry.weight=document.getElementById('work-weight').value;
        entry.sets=document.getElementById('work-sets').value;
        entry.reps=document.getElementById('work-reps').value;
        // PR 체크 (저장 전 기준)
        const prevMax=getPR(name);
        if(parseFloat(entry.weight)>prevMax&&prevMax>0)isPR=true;
        // PPL 저장
        const pplSel=document.getElementById('work-ppl');
        const pplVal=pplSel?pplSel.value:'자동';
        entry.ppl=pplVal;
        // history 저장 (ppl 포함)
        const hist=getHistory();
        hist[name]={part:entry.part,weight:entry.weight,sets:entry.sets,reps:entry.reps,ppl:pplVal};
        localStorage.setItem('workout_history',JSON.stringify(hist));
    }else{
        entry.part='유산소';
        entry.time=document.getElementById('cardio-time').value;
        entry.dist=document.getElementById('cardio-dist').value;
    }
    // 수정 모드면 기존 항목 교체, 아니면 추가
    const form=document.getElementById('work-form');
    const editId=form?.dataset.editId;
    if(editId){
        const idx=data[ds].workout.findIndex(x=>x.id===editId);
        if(idx>=0){entry.id=editId;data[ds].workout[idx]=entry;}
        else data[ds].workout.push(entry);
        delete form.dataset.editId;
    }else{
        data[ds].workout.push(entry);
    }
    saveData(data);

    const lib=getLib();
    if(!lib.includes(name)){lib.push(name);localStorage.setItem('workout_lib',JSON.stringify(lib));}

    if(isPR)showPR(name,entry.weight);
    else showToast('저장되었습니다!');
    renderActiveTab();
}

window.editFood=function(id){

window.deleteFood=function(id){

    const data=getData();
    data[window.currentDate].food=data[window.currentDate].food.filter(f=>f.id!==id);

function saveFood(e){
    e.preventDefault();
    const ds=window.currentDate;const data=getData();
    if(!data[ds])data[ds]={};if(!data[ds].food)data[ds].food=[];
    const editId=document.getElementById('edit-food-id').value;

    const prot=document.getElementById('food-prot').value;
    const entry={id:editId||'F'+Date.now(),name,prot};
    const presets=getPresets();presets[name]={prot};

    if(editId){const idx=data[ds].food.findIndex(f=>f.id===editId);data[ds].food[idx]=entry;}
    else data[ds].food.push(entry);

window.filterHistory=function(part,btn){
    if(btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
    const data=getData();
    let all=[];
    Object.entries(data).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>all.push({...w,date}));
    });
    all.sort((a,b)=>b.date.localeCompare(a.date));
    const filtered=part==='전체'?all:all.filter(w=>w.part===part);
    const listDiv=document.getElementById('history-list');
    if(filtered.length===0){listDiv.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:40px;">기록이 없습니다.</p>';return;}

    // 종목별 최고 중량 계산
    const maxByEx={};
    all.forEach(w=>{if(w.type==='weight'){const wt=parseFloat(w.weight)||0;if(!maxByEx[w.name]||wt>maxByEx[w.name])maxByEx[w.name]=wt;}});

    listDiv.innerHTML=filtered.map(w=>{
        const isPR=w.type==='weight'&&parseFloat(w.weight)>=(maxByEx[w.name]||0);
        return `<div class="card" style="padding:15px;">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:5px;">${w.date}</div>
            <strong>[${w.part}] ${w.name}</strong>${isPR?'<span class="pr-badge">🏆 PR</span>':''}
            <div style="font-size:13px;color:var(--text-muted);margin-top:5px;">
                ${w.type==='weight'?`${w.weight}kg | ${w.sets}세트 | ${w.reps}회`:`${w.time||0}분${w.dist&&w.dist>0?' | '+w.dist+'km':''}`}
            </div>
            ${w.memo?`<div style="font-size:12px;color:var(--text-muted);margin-top:8px;font-style:italic;">"${w.memo}"</div>`:''}
            <button class="btn-sm btn-edit" style="margin-top:10px;" onclick="goToEdit('${w.date}','${w.id}')">날짜로 이동</button>
        </div>`;
    }).join('');
};

window.goToEdit=function(date,id){

function renderBodyGraphs(days){
    const gc=document.getElementById('graph-content');
    gc.innerHTML=`
        <div style="display:flex;gap:8px;margin-bottom:15px;">
            <button onclick="renderBodyGraphs(7)" class="btn-sm" id="btn-7" style="flex:1;background:var(--primary);color:#fff;">최근 7일</button>
            <button onclick="renderBodyGraphs(30)" class="btn-sm" id="btn-30" style="flex:1;background:var(--day-bg);color:var(--text);">최근 30일</button>
        </div>
        <div class="card" style="height:300px;"><h4 style="margin:0 0 10px;">📉 체중 변화</h4><canvas id="wChart"></canvas></div>
        <div class="card" style="height:300px;"><h4 style="margin:0 0 10px;">🍗 단백질 섭취</h4><canvas id="pChart"></canvas></div>`;

    setTimeout(()=>{
        if(charts.w)charts.w.destroy();if(charts.p)charts.p.destroy();
        const data=getData();const labels=[],weights=[],prots=[];
        for(let i=days-1;i>=0;i--){
            const d=new Date(getKSTDate());d.setDate(d.getDate()-i);
            const s=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().split('T')[0];
            labels.push(days===30&&i%5!==0?'':s.slice(5));
            const e=data[s]||{};
            weights.push(e.weight?parseFloat(e.weight):null);
            prots.push((e.food||[]).reduce((sum,f)=>sum+Number(f.prot||0),0));
        }
        const isDark=document.body.getAttribute('data-theme')!=='light';
        const gc2={color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)'};
        const tc=isDark?'#888':'#666';
        const opts={responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{x:{grid:gc2,ticks:{color:tc}},y:{grid:gc2,ticks:{color:tc}}}};
        charts.w=new Chart(document.getElementById('wChart').getContext('2d'),{
            type:'line',
            data:{labels,datasets:[{data:weights,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',fill:true,tension:.3,spanGaps:true,pointRadius:days===30?0:4}]},
            options:opts
        });
        charts.p=new Chart(document.getElementById('pChart').getContext('2d'),{
            type:'bar',
            data:{labels,datasets:[{data:prots,backgroundColor:'rgba(34,197,94,0.7)',borderRadius:5}]},
            options:opts
        });
    },100);
}

function renderExerciseGraphs(){
    const data=getData();
    const exMap={};
    Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.type==='weight'&&parseFloat(w.weight)>0){

                exMap[w.name].push({date:date.slice(5),weight:parseFloat(w.weight)});

    if(exercises.length===0){gc.innerHTML='<div class="card"><p style="color:var(--text-muted);text-align:center;padding:30px;">2회 이상 기록된 운동이 없습니다.</p></div>';return;}

    gc.innerHTML=`
        <div class="card">
            <label>운동 종목 선택</label>

window.renderExerciseChart=function(name){
    const data=getData();
    const records=[];
    Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,day])=>{
        (day.workout||[]).forEach(w=>{
            if(w.name===name&&w.type==='weight'&&parseFloat(w.weight)>0)
                records.push({date:date.slice(5),weight:parseFloat(w.weight),full:date});
        });
    });
    document.getElementById('ex-chart-title').innerText=`${name} — 중량 변화`;
    if(charts.ex)charts.ex.destroy();
    const first=records[0]?.weight||0;
    const last=records[records.length-1]?.weight||0;
    const maxW=Math.max(...records.map(r=>r.weight));
    const diff=Math.round((last-first)*10)/10;
    const isDark=document.body.getAttribute('data-theme')!=='light';
    const gc2={color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)'};
    const tc=isDark?'#888':'#666';
    charts.ex=new Chart(document.getElementById('exChart').getContext('2d'),{
        type:'line',
        data:{
            labels:records.map(r=>r.date),
            datasets:[{
                data:records.map(r=>r.weight),
                borderColor:'#f59e0b',
                backgroundColor:'rgba(245,158,11,0.1)',
                fill:true,tension:.3,
                pointRadius:6,
                pointBackgroundColor:records.map(r=>r.weight===maxW?'#ef4444':'#f59e0b'),
                pointBorderColor:'#fff',pointBorderWidth:2,
            }]
        },
        options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false},tooltip:{callbacks:{
                label:ctx=>`${ctx.raw}kg${ctx.raw===maxW?' 🏆 최고기록':''}`
            }}},
            scales:{
                x:{grid:gc2,ticks:{color:tc}},
                y:{grid:gc2,ticks:{color:tc,callback:v=>v+'kg'}}
            }
        }
    });
    document.getElementById('ex-stats').innerHTML=`
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center;">
            <div><div style="font-size:22px;font-weight:900;color:var(--secondary);">${first}kg</div><div style="font-size:11px;color:var(--text-muted);">시작 중량</div></div>
            <div><div style="font-size:22px;font-weight:900;color:${diff>=0?'var(--success)':'var(--danger)'};">${diff>=0?'+':''}${diff}kg</div><div style="font-size:11px;color:var(--text-muted);">총 변화</div></div>
            <div><div style="font-size:22px;font-weight:900;color:#f59e0b;">${maxW}kg</div><div style="font-size:11px;color:var(--text-muted);">최고 🏆</div></div>
        </div>
        <div style="margin-top:14px;font-size:12px;color:var(--text-muted);text-align:center;">🔴 빨간 점 = 최고 중량 기록 지점</div>`;
};

window.applyTheme=applyTheme;
window.saveProtGoal=function(){
    const v=document.getElementById('prot-goal-input')?.value;
    if(!v||parseInt(v)<1)return;
    localStorage.setItem('prot_goal',v);
    showToast('단백질 목표 '+v+'g 저장!','🎯');
};

function getBackupData(){
    const keys=['fit_data','workout_lib','workout_history','food_presets'];
    const b={};keys.forEach(k=>b[k]=JSON.parse(localStorage.getItem(k)||'{}'));
    return JSON.stringify(b,null,2);
}
function updateBackupTime(){
    const n=new Date();
    const t=`${n.getMonth()+1}/${n.getDate()} ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
    localStorage.setItem('last_backup_time',t);
}
window.exportData=function(){
    const blob=new Blob([getBackupData()],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`FitTrack_Backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    updateBackupTime();
};
window.copyData=function(){
    const el=document.createElement('textarea');el.value=getBackupData();
    document.body.appendChild(el);el.select();document.execCommand('copy');
    document.body.removeChild(el);
    updateBackupTime();
    document.getElementById('copy-modal').style.display='block';
};
window.importData=function(input){
    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(e)=>{
        try{
            const data=JSON.parse(e.target.result);
            if(confirm('기존 데이터를 덮어쓰고 불러오시겠습니까?')){
                Object.keys(data).forEach(k=>localStorage.setItem(k,JSON.stringify(data[k])));
                showToast('복구 완료!','📂');location.reload();
            }
        }catch{alert('잘못된 파일 형식입니다.');}
    };
    reader.readAsText(file);
};
window.clearData=function(){
    if(confirm('정말 모든 기록을 영구 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')){
        const theme=localStorage.getItem('app_theme');
        localStorage.clear();
        if(theme)localStorage.setItem('app_theme',theme);
        location.reload();
    }
};
window.renderManagement=renderManagement;

/* ==================================================
   SERVICE WORKER
================================================== */
if('serviceWorker'in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
